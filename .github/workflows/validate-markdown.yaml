name: validate-markdown

on:
  pull_request:
    paths:
      - "**/*.md"
      - "scripts/validate_markdown_links.py"
      - "scripts/regenerate_proposals_impl_tracking.py"
      - ".github/workflows/validate-markdown.yaml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "scripts/validate_markdown_links.py"
      - "scripts/regenerate_proposals_impl_tracking.py"
      - ".github/workflows/validate-markdown.yaml"
  # Weekly run on main. The push/PR triggers above only fire on spec-repo
  # changes, but the impl-tracking columns regenerate from the live
  # openarmature-python conformance.toml — so a python release can drift them
  # with no spec-repo commit, leaving main green-but-stale until an unrelated
  # PR trips --check. This scheduled run surfaces that drift proactively.
  schedule:
    - cron: "0 12 * * 1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/validate_markdown_links.py
      - name: Check proposals impl-tracking columns are current
        run: python scripts/regenerate_proposals_impl_tracking.py --check
