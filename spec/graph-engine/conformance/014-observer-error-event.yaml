# Observer hooks — failed-node event shape.
#
# Two-node graph: ok_node -> fail_node -> END. The second node raises.
#
# Verifies:
#   - The observer receives a node event for the FAILING node with `error`
#     populated (category `node_exception`) and `post_state` ABSENT
#     (exactly one of post_state or error MUST be populated per §6).
#   - The engine then propagates the error to the caller, unchanged from
#     its §4 contract.

state:
  fields:
    v:
      type: string
      default: ""
    trace:
      type: list<string>
      reducer: append
      default: []

entry: ok_node

nodes:
  ok_node:
    update: {v: "ok", trace: ["ok_node"]}
  fail_node:
    raises: "boom"

edges:
  - {from: ok_node,   to: fail_node}
  - {from: fail_node, to: END}

initial_state: {}

observers:
  - name: obs
    attach: graph
    target: outer
    behavior: record

expected:
  # The graph run does NOT complete successfully — fail_node raises and
  # the engine propagates a node_exception per §4. The observer event for
  # ok_node was already dispatched (step 0); the event for fail_node is
  # dispatched with `error` populated before the failure propagates.
  expected_error:
    category: node_exception
    message: "boom"

  # Each attempt produces a started/completed pair. The failing node STILL
  # produces a started event (engine fires it before invoking the node) and
  # a completed event with `error` populated.
  observer_events:
    obs:
      - {step: 0, phase: started,   node_name: ok_node, namespace: [ok_node],
         pre_state: {v: "", trace: []}}
      - {step: 0, phase: completed, node_name: ok_node, namespace: [ok_node],
         pre_state: {v: "", trace: []}, post_state: {v: "ok", trace: ["ok_node"]}}
      - {step: 1, phase: started,   node_name: fail_node, namespace: [fail_node],
         pre_state: {v: "ok", trace: ["ok_node"]}}
      # Failed-node completed event: `error` populated, `post_state` absent.
      - {step: 1, phase: completed, node_name: fail_node, namespace: [fail_node],
         pre_state: {v: "ok", trace: ["ok_node"]}, error: node_exception}

  delivery_order:
    - {observer: obs, step: 0, phase: started}
    - {observer: obs, step: 0, phase: completed}
    - {observer: obs, step: 1, phase: started}
    - {observer: obs, step: 1, phase: completed}
