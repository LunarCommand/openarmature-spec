# Verifies the §6 attempt_index default behavior added by proposal 0004.
# A linear graph with no retry middleware: every node event MUST carry
# attempt_index == 0.
#
# This fixture confirms the §6 modification's default value is honored across
# the workflows that don't involve retry middleware. The retry-driven
# per-attempt-events behavior is exercised in pipeline-utilities/conformance/
# fixture 015.

state:
  fields:
    v:
      type: int
      default: 0
    trace:
      type: list<string>
      reducer: append
      default: []

entry: a

nodes:
  a:
    update: {v: 1, trace: ["a"]}
  b:
    update: {v: 2, trace: ["b"]}
  c:
    update: {v: 3, trace: ["c"]}

edges:
  - {from: a, to: b}
  - {from: b, to: c}
  - {from: c, to: END}

initial_state: {}

observers:
  - {name: obs, attach: graph, target: outer, behavior: record}

expected:
  final_state: {v: 3, trace: ["a", "b", "c"]}
  execution_order: [a, b, c]

  observer_events:
    obs:
      # Every attempt produces a started/completed event pair. attempt_index
      # is 0 since no retry middleware is in play.
      - {step: 0, phase: started,   node_name: a, attempt_index: 0, namespace: [a],
         pre_state: {v: 0, trace: []}, parent_states: []}
      - {step: 0, phase: completed, node_name: a, attempt_index: 0, namespace: [a],
         pre_state: {v: 0, trace: []}, post_state: {v: 1, trace: ["a"]}, parent_states: []}
      - {step: 1, phase: started,   node_name: b, attempt_index: 0, namespace: [b],
         pre_state: {v: 1, trace: ["a"]}, parent_states: []}
      - {step: 1, phase: completed, node_name: b, attempt_index: 0, namespace: [b],
         pre_state: {v: 1, trace: ["a"]}, post_state: {v: 2, trace: ["a", "b"]}, parent_states: []}
      - {step: 2, phase: started,   node_name: c, attempt_index: 0, namespace: [c],
         pre_state: {v: 2, trace: ["a", "b"]}, parent_states: []}
      - {step: 2, phase: completed, node_name: c, attempt_index: 0, namespace: [c],
         pre_state: {v: 2, trace: ["a", "b"]},
         post_state: {v: 3, trace: ["a", "b", "c"]}, parent_states: []}
