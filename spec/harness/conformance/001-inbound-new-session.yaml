# Harness conformance fixture suite — per-directory harness contract:
#
#   - The adapter instantiates a reference harness with a synthetic
#     in-process transport. The transport accepts synthetic transmissions
#     (each carrying a `payload` mapping; optionally a dispatch_intent
#     hint, a session_id, a signal_payload) and delivers them to the
#     harness's inbound entrypoint.
#   - Top-level YAML shape extends the conformance-adapter §4 schema with
#     a `harness:` block (mode + signal_coordinator config) and a
#     `transmissions:` list (each entry exercises one inbound).
#   - Per-transmission expected assertions: `dispatch_path` (3.0/3.1/3.2/3.3),
#     `invoke_outcome` (completed|errored|suspended), `invoke_args` (the
#     args passed to invoke()), `error_category` + `error_bucket`
#     (terminating|retryable|user_correctable) per harness §7.
#   - Stateless-mode harnesses use dispatch_path 3.0 exclusively.
#
# §3.1 New-session inbound path: a synthetic transmission with no
# session_id; the harness assigns a fresh session_id and invokes with
# it threaded.

cases:
  - name: harness_assigns_fresh_session_id_on_new_session
    description: |
      Sessioned-mode harness receives a synthetic transmission with no
      session_id in the payload. The harness classifies as path §3.1
      (new-session), assigns a fresh session_id, constructs initial
      state, and calls invoke(initial_state, session_id=<fresh_id>).
      The fresh id is auto-generated by the harness; the engine treats
      it as the new session's identifier and saves at completion.
    harness:
      mode: sessioned
    state:
      fields:
        message_count:
          type: int
          default: 0
    entry: increment
    nodes:
      increment:
        update: {message_count: 1}
    edges:
      - {from: increment, to: END}
    session_store: in_memory
    transmissions:
      - name: tx_no_session_id
        payload: {kind: "new_session_start"}
        dispatch_intent: new_session
        expected:
          dispatch_path: "3.1"
          invoke_args:
            session_id_present: true
            session_id_auto_generated: true   # harness minted, not caller-supplied
          invoke_outcome: completed
          final_state: {message_count: 1}
    invariants:
      harness_classified_as_new_session_path: true
      harness_auto_generated_session_id: true
      engine_received_session_id: true
