# §7.2 Retryable transient errors: provider_unavailable (llm-provider
# §7) is classified by the harness as retryable_transient per §7.2.
# Auto-retry MAY occur per runtime conventions; the spec defines the
# classification, not the retry policy.

cases:
  - name: provider_unavailable_classified_as_retryable_transient
    description: |
      Sessioned-mode harness; transmission triggers a graph whose node
      raises provider_unavailable. The harness classifies into the
      retryable_transient bucket per §7.2 and emits an outbound that
      surfaces the bucket so callers can decide whether to retry.
      The spec doesn't mandate auto-retry — fixture asserts on
      classification + outbound shape only.
    harness:
      mode: sessioned
    state:
      fields:
        v:
          type: int
          default: 0
    entry: flaky_node
    nodes:
      flaky_node:
        raises:
          category: provider_unavailable
          message: "rate limited"
    edges:
      - {from: flaky_node, to: END}
    session_store: in_memory
    transmissions:
      - name: tx_flaky
        payload: {session_id: "conv-001"}
        dispatch_intent: new_session
        expected:
          dispatch_path: "3.1"
          invoke_outcome: errored
          error_category: provider_unavailable
          error_bucket: retryable_transient   # per §7.2
          outbound_shape: error_response
          outbound_payload_includes:
            category: provider_unavailable
            bucket: retryable_transient
            retry_safe: true
    invariants:
      provider_unavailable_classified_as_retryable_transient: true
      outbound_marked_retry_safe: true
