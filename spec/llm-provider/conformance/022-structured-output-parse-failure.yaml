# Structured output — JSON parse failure. complete() called with a
# response_schema; the provider returns content that is not valid JSON
# (the model finished normally but emitted malformed JSON — NOT a
# max-tokens truncation, which carries finish_reason: length; see
# observability fixture 120). Implementation MUST raise structured_output_invalid
# with the schema, raw content, and a parse-failure description in the
# error payload.

mock_provider:
  responses:
    - status: 200
      body:
        id: chatcmpl-test-022
        object: chat.completion
        created: 1700000000
        model: test-model
        choices:
          - index: 0
            message:
              role: assistant
              # Malformed JSON — missing comma between members (complete but invalid).
              content: '{"name": "Alice" "age": 30}'
            finish_reason: stop
        usage: {prompt_tokens: 20, completion_tokens: 8, total_tokens: 28}

calls:
  - operation: complete
    messages:
      - {role: user, content: "Generate a person record."}
    response_schema:
      type: object
      properties:
        name: {type: string}
        age: {type: integer}
      required: [name, age]
      additionalProperties: false
    expected:
      raises:
        category: structured_output_invalid
        carries:
          # The error MUST expose these so the user can debug.
          response_schema_present: true
          raw_response_content: '{"name": "Alice" "age": 30}'
          failure_description_present: true
          # finish_reason + usage are now required on the error (proposal 0082)
          # — sourced from the received (but unparseable) response.
          finish_reason: stop
          usage: {prompt_tokens: 20, completion_tokens: 8, total_tokens: 28}
