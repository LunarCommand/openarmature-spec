# §8.2.5 Anthropic native structured output. When response_schema is
# supplied, the wire request carries output_config.format =
# {type: json_schema, schema: <response_schema verbatim>}. The response
# text content is parsed into Response.parsed and validated against the
# schema.

mapping: anthropic

mock_provider:
  capabilities:
    supports_native_structured_output: true
  responses:
    - status: 200
      body:
        type: message
        id: msg_040
        model: claude-test
        role: assistant
        content:
          - {type: text, text: '{"value":42}'}
        stop_reason: end_turn
        usage: {input_tokens: 10, output_tokens: 4}

calls:
  - operation: complete
    messages: [{role: user, content: "Generate."}]
    response_schema:
      type: object
      properties:
        value: {type: integer}
      required: [value]
      additionalProperties: false
    config: {max_tokens: 64}
    expected_wire_request:
      model: claude-test
      max_tokens: 64
      messages: [{role: user, content: "Generate."}]
      output_config:
        format:
          type: json_schema
          schema:
            type: object
            properties:
              value: {type: integer}
            required: [value]
            additionalProperties: false
    expected:
      response:
        message: {role: assistant, content: '{"value":42}', tool_calls: null}
        finish_reason: stop
        parsed: {value: 42}
