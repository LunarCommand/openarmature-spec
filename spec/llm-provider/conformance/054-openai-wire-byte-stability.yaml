# §8 Intra-impl wire-byte stability — OpenAI-compatible mapping. Two
# complete() calls with structurally-equivalent OA inputs constructed with
# different insertion orders MUST produce byte-identical OpenAI wire
# request bodies. The fixture exercises:
#   - tool parameter schemas (sorted JSON object keys at every nesting
#     level)
#   - RuntimeConfig extras (an undeclared object — sorted at the request
#     body root)
#   - content-block source dicts (inline image — sorted keys)
#
# No `mapping` key -> defaults to the §8.1 OpenAI-compatible mapping.

mock_provider:
  responses:
    - status: 200
      body:
        id: cc-054-a
        object: chat.completion
        created: 1700000000
        model: gpt-test
        choices:
          - index: 0
            message: {role: assistant, content: "OK"}
            finish_reason: stop
        usage: {prompt_tokens: 12, completion_tokens: 1, total_tokens: 13}
    - status: 200
      body:
        id: cc-054-b
        object: chat.completion
        created: 1700000001
        model: gpt-test
        choices:
          - index: 0
            message: {role: assistant, content: "OK"}
            finish_reason: stop
        usage: {prompt_tokens: 12, completion_tokens: 1, total_tokens: 13}

calls:
  # Call A: tool parameters built with keys in declaration order
  # (location, units); RuntimeConfig extras in alphabetical order
  # (alpha, beta); image-block source dict authored with (type, url).
  - operation: complete
    messages:
      - role: user
        content:
          - {type: text, text: "Describe this image."}
          - type: image
            source: {type: url, url: "https://example.invalid/i.png"}
            media_type: "image/png"
    tools:
      - name: get_weather
        description: "Weather lookup."
        parameters:
          type: object
          properties:
            location: {type: string}
            units: {type: string, enum: [celsius, fahrenheit]}
          required: [location]
    config:
      max_tokens: 64
      temperature: 0.7
      extras:
        alpha: "one"
        beta: 2
    expected:
      response:
        message: {role: assistant, content: "OK", tool_calls: null}
        finish_reason: stop

  # Call B: same OA semantics but constructed with reversed insertion
  # orders. Tool parameters keys built as (units, location); RuntimeConfig
  # extras as (beta, alpha); image-block source dict authored with
  # (url, type) and surrounding block fields reversed (media_type, source,
  # type). The implementation MUST canonicalize all of these so the wire
  # bytes match call A's output exactly.
  - operation: complete
    messages:
      - role: user
        content:
          - {type: text, text: "Describe this image."}
          - media_type: "image/png"
            source: {url: "https://example.invalid/i.png", type: url}
            type: image
    tools:
      - name: get_weather
        description: "Weather lookup."
        parameters:
          type: object
          required: [location]
          properties:
            units: {type: string, enum: [celsius, fahrenheit]}
            location: {type: string}
    config:
      temperature: 0.7
      max_tokens: 64
      extras:
        beta: 2
        alpha: "one"
    expected:
      response:
        message: {role: assistant, content: "OK", tool_calls: null}
        finish_reason: stop

# Assertion: the wire request body produced for call A and call B MUST be
# byte-identical. Implementations that build wire bytes deterministically
# pass without code change; implementations relying on insertion-order
# JSON serialization MUST canonicalize at the boundaries listed in the §8
# *Intra-impl wire-byte stability* paragraph.
expected_wire_bytes_identical:
  calls: [0, 1]
