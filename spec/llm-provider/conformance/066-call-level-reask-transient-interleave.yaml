# §7.1 Call-level retry — a transient failure interleaved inside a
# reask-enabled loop. complete() is called with a response_schema and a reask
# builder (NO per_attempt_override). Attempt 0 returns schema-invalid JSON
# (missing required "age") → structured_output_invalid, which the reask builder
# makes retryable for this call. Attempt 1 (the reask retry) carries the
# corrective pair from attempt 0 but returns HTTP 503 → provider_unavailable, a
# TRANSIENT failure. Attempt 2 (the transient retry) re-sends the SAME
# accumulated transcript — a transient retry appends no new reask pair — and
# returns corrected, schema-valid JSON; the call succeeds. Three LLM spans
# emit; the two retries carry DISTINCT retry_reason values (attempt 1 = reask,
# because it retried attempt 0's structured_output_invalid; attempt 2 =
# transient, because it retried attempt 1's 503), proving retry_reason
# discriminates the two retry causes within a single loop.

mock_provider:
  responses:
    # Attempt 0 — valid JSON, but missing the required "age" field →
    # structured_output_invalid. The reask builder makes this retryable.
    - status: 200
      body:
        id: cc-066-a
        object: chat.completion
        model: gpt-test
        choices:
          - index: 0
            message: {role: assistant, content: '{"name":"Eve"}'}
            finish_reason: stop
        usage: {prompt_tokens: 20, completion_tokens: 6, total_tokens: 26}
    # Attempt 1 (reask retry) — HTTP 503 → provider_unavailable (transient).
    # Its REQUEST carries the reask pair accumulated from attempt 0.
    - status: 503
      body:
        error:
          type: "service_unavailable"
          message: "service down"
    # Attempt 2 (transient retry) — corrected JSON that validates. Its REQUEST
    # re-sends the SAME accumulated transcript as attempt 1 (a transient retry
    # appends nothing new).
    - status: 200
      body:
        id: cc-066-c
        object: chat.completion
        model: gpt-test
        choices:
          - index: 0
            message: {role: assistant, content: '{"name":"Eve","age":50}'}
            finish_reason: stop
        usage: {prompt_tokens: 30, completion_tokens: 8, total_tokens: 38}

call:
  operation: complete
  messages:
    - {role: user, content: "Generate a person record."}
  response_schema:
    type: object
    properties:
      name: {type: string}
      age: {type: integer}
    required: [name, age]
    additionalProperties: false
  retry:
    max_attempts: 3
    backoff: {type: deterministic, seconds: 0}
    # Reask builder stand-in; interpolates {error_message}, so the rendered
    # user message is asserted via content_contains below. NO
    # per_attempt_override — this fixture isolates the transient/reask
    # interleave, not sampling composition.
    reask:
      template: "Fix {output_content}: {error_message}"

expected:
  response:
    message:
      role: assistant
      content: '{"name":"Eve","age":50}'
      tool_calls: null
    finish_reason: stop
    parsed: {name: "Eve", age: 50}
  # Attempt 0 carries only the caller's original messages (nothing appended).
  # Attempt 1 (reask retry) appends attempt 0's pair: the model's raw output as
  # an assistant message, then the builder's rendered correction as a user
  # message. Attempt 2 (transient retry) re-sends the EXACT SAME accumulated
  # transcript as attempt 1 — a transient retry appends no new reask pair —
  # proving the transient attempt carries the accumulated reask transcript
  # through unchanged. User corrections use content_contains (the template
  # interpolates the implementation-defined {error_message}); the assistant
  # output is asserted exactly (the verbatim model output).
  wire_requests:
    # Attempt 0 — base attempt; nothing appended.
    - appended_messages: []
    # Attempt 1 (reask retry) — appends attempt 0's corrective pair.
    - appended_messages:
        - {role: assistant, content: '{"name":"Eve"}'}
        - {role: user, content_contains: ["Fix", '{"name":"Eve"}']}
    # Attempt 2 (transient retry) — SAME accumulated transcript as attempt 1;
    # the transient retry appends nothing new.
    - appended_messages:
        - {role: assistant, content: '{"name":"Eve"}'}
        - {role: user, content_contains: ["Fix", '{"name":"Eve"}']}
  llm_spans:
    # Attempt 0 — base attempt; FAILED structured_output_invalid (missing
    # "age"); carries no retry_reason.
    - attempt_index: 0
      attributes:
        "openarmature.llm.attempt_index": 0
      attributes_absent: ["openarmature.llm.retry_reason"]
      error_category: structured_output_invalid
    # Attempt 1 (reask retry) — retried BECAUSE attempt 0 was a reasked
    # structured_output_invalid (retry_reason = reask), but attempt 1 itself
    # FAILED transient (provider_unavailable).
    - attempt_index: 1
      attributes:
        "openarmature.llm.attempt_index": 1
        "openarmature.llm.retry_reason": reask
      error_category: provider_unavailable
    # Attempt 2 (transient retry) — retried BECAUSE attempt 1 was a 503
    # (retry_reason = transient); corrected and succeeds.
    - attempt_index: 2
      attributes:
        "openarmature.llm.attempt_index": 2
        "openarmature.llm.retry_reason": transient
        "openarmature.llm.finish_reason": stop
        "openarmature.llm.model": gpt-test
      error_category: null
  invariants:
    transient_retry_carries_accumulated_reask_transcript: true
    retry_reason_discriminates_reask_vs_transient_in_one_loop: true
    reask_makes_structured_output_invalid_retryable: true
    caller_messages_unmutated: true
    n_attempts_emit_n_llm_spans: true
