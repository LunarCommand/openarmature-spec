# llm-provider §6 *Managed-field collision* (reject arm) — a §8.1 managed
# STRUCTURAL wire-root field: `model`.
#
# §8.1 sets several request-body-root fields for its own correctness that are
# NOT declared RuntimeConfig fields, so an undeclared extras key of the same
# name collides with them at the root: `model` (the bound model identifier),
# `messages` / `tools` (the complete() arguments), `tool_choice` (the §5
# parameter). Each is a managed non-additive field — an extras override would
# silently replace the caller's conversation, tool set, or bound model, via the
# request-body-root merge §8.1 codifies. Per §6, a conflicting extras value is
# rejected pre-send.
#
# This fixture pins the mechanic on the clearest single-value case, `model`
# (the "silent re-route to a different model" failure); `messages` / `tools` /
# `tool_choice` share the same managed-internal-wire-root reject mechanic. (The
# `stop` wire field is NOT managed-internal — it realizes the declared
# `stop_sequences`, a declared-field-vs-extras question deferred with the
# residual audit; see docs/open-questions.md.)
#
# ---------------------------------------------------------------------
# Per-directory harness directives: see 005's header (mapping: openai default,
# the bound model becomes the wire `model` field), 032's header (config.extras
# — the §6 undeclared-field pass-through bag, which lands keys at the
# request-body root), and 060's header (the pre-send reject convention:
# mock_provider.responses: [] so a sent request fails the test; expected.raises:
# {category}).

cases:
  - name: extras_model_conflicts_with_bound_model_rejected_pre_send
    description: |
      complete(config={extras: {model: "other-model"}}). The mapping sets the
      wire `model` from its bound identifier (test-model, §3 / §5 per-instance
      binding); the caller's extras `model` — an UNDECLARED key — collides with
      it at the request-body root. Per §6's managed-field collision reject arm
      (`model` is a managed structural field, §8.1), the mapping MUST raise
      provider_invalid_request at pre-send validation and MUST NOT issue any
      request: honoring "other-model" would silently re-route the call to a
      different model than the caller bound (a caller who wants a different
      model binds a different provider instance). The mapping MUST NOT silently
      drop the extras value or forward it untouched.
    call:
      operation: complete
      messages:
        - {role: user, content: "hi"}
      config:
        extras:
          model: "other-model"
    mock_provider:
      # Never reached — rejection is pre-send. A sent request fails the test.
      responses: []
    expected:
      raises:
        category: provider_invalid_request
      invariants:
        managed_structural_model_conflict_rejected_pre_send: true
        no_request_issued: true
        bound_model_not_silently_overridden: true
        extras_model_neither_dropped_nor_forwarded: true
