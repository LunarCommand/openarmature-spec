# Detached trace mode (§4.4): opt-in per subgraph or per fan-out node. The
# parent trace ends at the dispatch span and carries an OTel Link to the
# detached trace's root. Two sub-cases — detached subgraph and detached fan-out.

cases:
  - name: detached_subgraph_two_traces_one_link
    subgraphs:
      long_running_workflow:
        state:
          fields:
            x:
              type: int
              default: 0
        entry: step
        nodes:
          step:
            update_pure: {x: 1}
        edges:
          - {from: step, to: END}
    state:
      fields:
        ran:
          type: bool
          default: false
    entry: dispatch
    nodes:
      dispatch:
        subgraph: long_running_workflow
      after:
        update: {ran: true}
    edges:
      - {from: dispatch, to: after}
      - {from: after,    to: END}
    initial_state: {}
    detached_subgraphs: ["long_running_workflow"]
    expected:
      # Two distinct traces; the parent's `dispatch` span carries a Link to
      # the detached trace's root.
      traces:
        - trace_id: "<trace_id_parent>"
          span_tree:
            - name: "openarmature.invocation"
              status: OK
              children:
                - name: "dispatch"
                  status: OK
                  links:
                    - target_trace_id: "<trace_id_detached>"
                  children: []   # detached — no nested children in parent trace
                - name: "after"
                  status: OK
                  children: []
        - trace_id: "<trace_id_detached>"
          span_tree:
            # Detached trace roots in its own openarmature.invocation span
            # carrying the SAME invocation_id as the parent (§4.4 / §4.3 —
            # detached mode is observer-side rendering, not a new invocation);
            # the subgraph span nests under it, NOT under the parent's
            # invocation span.
            - name: "openarmature.invocation"
              status: OK
              children:
                - name: "long_running_workflow"
                  status: OK
                  children:
                    - name: "step"
                      status: OK
                      children: []
      invariants:
        # Parent invocation span and detached invocation span have DIFFERENT trace_ids.
        distinct_trace_ids: true
        # Parent's `dispatch` span has exactly one Link, targeting the detached trace.
        dispatch_span_link_count: 1
        # The §3 correlation_id is the SAME on both traces (correlation_id flows
        # across the trace boundary unchanged).
        correlation_id_consistent_across_traces: true
        # The detached invocation span carries the SAME invocation_id as the
        # parent invocation span (§4.3 detached-dispatch correlation).
        detached_invocation_id_equals_parent: true

  - name: detached_fan_out_one_trace_per_instance
    subgraph:
      name: per_doc
      state:
        fields:
          input:
            type: int
            default: 0
          out:
            type: int
            default: 0
      entry: score
      nodes:
        score:
          update_pure_from_state: {out: input_times_two}
      edges:
        - {from: score, to: END}
    state:
      fields:
        items:
          type: list<int>
          default: [1, 2, 3]
        results:
          type: list<int>
          reducer: append
          default: []
    entry: per_document_scoring
    nodes:
      per_document_scoring:
        fan_out:
          subgraph: per_doc
          items_field: items
          item_field: input
          collect_field: out
          target_field: results
    edges:
      - {from: per_document_scoring, to: END}
    initial_state: {}
    detached_fan_outs: ["per_document_scoring"]
    expected:
      # Parent trace contains the invocation + fan-out node span; the node
      # span carries one Link per instance trace.
      parent_trace:
        span_tree:
          - name: "openarmature.invocation"
            status: OK
            children:
              - name: "per_document_scoring"
                status: OK
                children: []
                link_count: 3   # one Link per detached instance trace
      # Three detached traces, one per instance.
      detached_trace_count: 3
      invariants:
        # Each instance trace has its own trace_id, distinct from the parent.
        all_instance_trace_ids_distinct: true
        # All four traces (parent + 3 instances) carry the same correlation_id.
        correlation_id_consistent_across_traces: true
        # No openarmature spans from inside the per-instance subgraphs leaked
        # into the parent trace.
        no_instance_spans_in_parent_trace: true
        # Each instance trace roots in its own openarmature.invocation span
        # carrying the same invocation_id as the parent (§4.4 detached fan-out).
        each_instance_trace_roots_in_invocation_span_sharing_parent_invocation_id: true

  - name: detached_subgraph_raises_error_status_on_both_spans
    # §4.2 Detached invocation span status (proposal 0061): when a detached
    # subgraph's inner node raises, ERROR surfaces on BOTH the parent's dispatch
    # span (parent trace) and the detached invocation span (detached trace) —
    # distinct traces, each the authoritative status carrier for its own view of
    # the dispatch; each carries the §4 category + an OTel exception event.
    subgraphs:
      long_running_workflow:
        state:
          fields:
            x:
              type: int
              default: 0
        entry: step
        nodes:
          step:
            raises: "boom"
        edges:
          - {from: step, to: END}
    state:
      fields:
        ran:
          type: bool
          default: false
    entry: dispatch
    nodes:
      dispatch:
        subgraph: long_running_workflow
      after:
        update: {ran: true}
    edges:
      - {from: dispatch, to: after}
      - {from: after,    to: END}
    initial_state: {}
    detached_subgraphs: ["long_running_workflow"]
    expected:
      traces:
        - trace_id: "<trace_id_parent>"
          span_tree:
            # Parent trace: the `dispatch` span reflects the subgraph's failure
            # (§4.4); the parent invocation span inherits ERROR.
            - name: "openarmature.invocation"
              status: ERROR
              children:
                - name: "dispatch"
                  status: ERROR
                  status_description: "node_exception"
                  exception_recorded: true
                  attributes:
                    openarmature.error.category: "node_exception"
                  links:
                    - target_trace_id: "<trace_id_detached>"
                  children: []   # detached — no nested children in parent trace
        - trace_id: "<trace_id_detached>"
          span_tree:
            # Detached trace: the detached invocation span carries the detached
            # unit's own ERROR status + §4 category + exception event (§4.2
            # *Detached invocation span status*); the raising node carries the
            # category as usual.
            - name: "openarmature.invocation"
              status: ERROR
              status_description: "node_exception"
              exception_recorded: true
              attributes:
                openarmature.error.category: "node_exception"
              children:
                - name: "long_running_workflow"
                  status: ERROR
                  children:
                    - name: "step"
                      status: ERROR
                      status_description: "node_exception"
                      exception_recorded: true
                      attributes:
                        openarmature.error.category: "node_exception"
                      children: []
      invariants:
        # ERROR on BOTH the parent's dispatch span and the detached invocation span.
        error_status_on_parent_dispatch_span: true
        error_status_on_detached_invocation_span: true
        # Both ERROR spans carry an OTel exception event with the §4 category.
        exception_event_on_both_error_spans: true
        # The two status-carrier spans live in DISTINCT traces but share invocation_id.
        distinct_trace_ids: true
        detached_invocation_id_equals_parent: true

  - name: detached_fan_out_instance_raises_error_status_on_both_spans
    # §4.2 Detached invocation span status (proposal 0061), fan-out-instance
    # variant: when a detached fan-out instance's inner node raises, ERROR
    # surfaces on BOTH the parent's fan-out node dispatch span (parent trace) and
    # that instance's per-instance detached invocation span (its own detached
    # trace) — each the authoritative status carrier for its own view of the
    # dispatch, each carrying the §4 category + an OTel exception event. This is
    # the fan-out-instance counterpart to case 3 (detached subgraph): case 2's
    # detached fan-out structure with the inner node raising.
    #
    # A SINGLE-element fan-out (items: [1]) is used deliberately — exactly one
    # instance runs and raises, so there is no fail_fast sibling-cancellation
    # nondeterminism, and the trace shape is the clean one-parent-trace +
    # one-detached-instance-trace dual exactly mirroring case 3.
    subgraph:
      name: per_doc
      state:
        fields:
          input:
            type: int
            default: 0
          out:
            type: int
            default: 0
      entry: score
      nodes:
        score:
          raises: "boom"
      edges:
        - {from: score, to: END}
    state:
      fields:
        items:
          type: list<int>
          default: [1]
        results:
          type: list<int>
          reducer: append
          default: []
    entry: per_document_scoring
    nodes:
      per_document_scoring:
        fan_out:
          subgraph: per_doc
          items_field: items
          item_field: input
          collect_field: out
          target_field: results
          error_policy: fail_fast
    edges:
      - {from: per_document_scoring, to: END}
    initial_state: {}
    detached_fan_outs: ["per_document_scoring"]
    expected_error:
      # Fan-out failures attribute to the fan-out node at the parent level (per
      # the fan-out fixtures' convention, e.g. pipeline-utilities 018); the inner
      # `score` raise propagates up wrapped as the fan-out node's node_exception.
      category: node_exception
      raised_from: per_document_scoring
    expected:
      traces:
        - trace_id: "<trace_id_parent>"
          span_tree:
            # Parent trace: the `per_document_scoring` fan-out NODE dispatch span
            # reflects the instance's failure (§4.2); the parent invocation span
            # inherits ERROR. The fan-out node span carries one Link to the
            # detached instance trace and (being detached) no nested per-instance
            # children in the parent trace.
            - name: "openarmature.invocation"
              status: ERROR
              children:
                - name: "per_document_scoring"
                  status: ERROR
                  status_description: "node_exception"
                  exception_recorded: true
                  attributes:
                    openarmature.error.category: "node_exception"
                  links:
                    - target_trace_id: "<trace_id_detached_instance>"
                  children: []   # detached — no per-instance children in parent trace
                  link_count: 1   # one Link to the single detached instance trace
        - trace_id: "<trace_id_detached_instance>"
          span_tree:
            # Detached instance trace: the per-instance detached invocation span
            # carries the instance's own ERROR status + §4 category + exception
            # event (§4.2 *Detached invocation span status*), sharing the parent
            # invocation_id. Beneath it, the per-instance subgraph span (named
            # after the fan-out node, disambiguated by fan_out_index) and the
            # raising `score` node carry the category as usual.
            - name: "openarmature.invocation"
              status: ERROR
              status_description: "node_exception"
              exception_recorded: true
              attributes:
                openarmature.error.category: "node_exception"
              children:
                - name: "per_document_scoring"
                  status: ERROR
                  attributes:
                    openarmature.node.fan_out_index: 0
                    openarmature.fan_out.parent_node_name: "per_document_scoring"
                  children:
                    - name: "score"
                      status: ERROR
                      status_description: "node_exception"
                      exception_recorded: true
                      attributes:
                        openarmature.error.category: "node_exception"
                      children: []
      invariants:
        # ERROR on BOTH the parent's fan-out node dispatch span and the
        # per-instance detached invocation span.
        error_status_on_parent_fan_out_node_span: true
        error_status_on_detached_instance_invocation_span: true
        # Both ERROR spans carry an OTel exception event with the §4 category.
        exception_event_on_both_error_spans: true
        # The two status-carrier spans live in DISTINCT traces.
        distinct_trace_ids: true
        # The parent's fan-out node span carries exactly one Link, targeting the
        # detached instance trace.
        fan_out_node_span_link_count: 1
        # The detached instance invocation span carries the SAME invocation_id as
        # the parent invocation span (§4.3 detached-dispatch correlation).
        detached_invocation_id_equals_parent: true
