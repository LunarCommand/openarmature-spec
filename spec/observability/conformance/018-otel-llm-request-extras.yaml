# RuntimeConfig extras: a provider-specific pass-through field (repetition_penalty)
# is supplied via RuntimeConfig's extra="allow" bag. Verifies §5.5.1
# openarmature.llm.request.extras — emitted as a JSON-encoded object when
# disable_llm_payload=False and the extras mapping is non-empty.

cases:
  - name: extras_emitted
    description: |
      Single LLM call with RuntimeConfig carrying one provider-specific
      extra (repetition_penalty: 1.05). disable_llm_payload=False on the
      observer. The openarmature.llm.request.extras attribute carries a
      JSON-encoded object with the extras mapping.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: ask_llm
    nodes:
      ask_llm:
        calls_llm:
          messages: [{role: user, content: "hi"}]
          stores_response_in: msg
          config:
            temperature: 0.7
            extras:
              repetition_penalty: 1.05
    edges:
      - {from: ask_llm, to: END}
    initial_state: {}
    mock_llm:
      - status: 200
        body:
          id: cc-18
          object: chat.completion
          model: test-model
          choices:
            - {index: 0, message: {role: assistant, content: "ok"}, finish_reason: stop}
          usage: {prompt_tokens: 5, completion_tokens: 1, total_tokens: 6}
    disable_llm_payload: false
    expected:
      span_tree:
        - name: "openarmature.invocation"
          status: OK
          children:
            - name: "ask_llm"
              status: OK
              children:
                - name: "openarmature.llm.complete"
                  status: OK
                  attributes:
                    gen_ai.request.temperature: 0.7
                  attribute_parses_as_object:
                    openarmature.llm.request.extras:
                      repetition_penalty: 1.05
                  children: []
