# disable_genai_semconv opt-out: observer constructed with
# disable_genai_semconv=True. Verifies §5.5.4 — no gen_ai.* attributes
# emit, while the v0.7.0 OA-namespaced baseline attributes continue to
# emit normally.

cases:
  - name: genai_opt_out
    description: |
      Single LLM call with the observer configured with
      disable_genai_semconv=True. The §5.5.2 request-parameter attributes
      and the §5.5.3 response-attribute set MUST NOT emit. The v0.7.0
      OA-namespaced baseline attributes (openarmature.llm.*) continue to
      emit normally — the GenAI opt-out only suppresses the GenAI
      semconv attributes.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: ask_llm
    nodes:
      ask_llm:
        calls_llm:
          messages: [{role: user, content: "hi"}]
          stores_response_in: msg
          config:
            temperature: 0.7
    edges:
      - {from: ask_llm, to: END}
    initial_state: {}
    mock_llm:
      - status: 200
        body:
          id: cc-21
          object: chat.completion
          model: test-model
          choices:
            - {index: 0, message: {role: assistant, content: "ok"}, finish_reason: stop}
          usage: {prompt_tokens: 5, completion_tokens: 1, total_tokens: 6}
    disable_genai_semconv: true
    expected:
      span_tree:
        - name: "openarmature.invocation"
          status: OK
          children:
            - name: "ask_llm"
              status: OK
              children:
                - name: "openarmature.llm.complete"
                  status: OK
                  attributes:
                    # v0.7.0 baseline — preserved under the GenAI opt-out
                    openarmature.llm.model: "test-model"
                    openarmature.llm.finish_reason: "stop"
                    openarmature.llm.usage.prompt_tokens: 5
                    openarmature.llm.usage.completion_tokens: 1
                    openarmature.llm.usage.total_tokens: 6
                  attributes_absent:
                    - "gen_ai.system"
                    - "gen_ai.request.model"
                    - "gen_ai.request.temperature"
                    - "gen_ai.response.model"
                    - "gen_ai.usage.input_tokens"
                    - "gen_ai.usage.output_tokens"
                    - "gen_ai.response.finish_reasons"
                    - "gen_ai.response.id"
                  children: []
