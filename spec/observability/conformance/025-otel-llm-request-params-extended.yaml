# §5.5.2 extended request-parameter attribute list (proposal 0032):
# all seven declared RuntimeConfig fields set on a single call;
# verifies the LLM provider span carries the corresponding seven
# gen_ai.request.* attributes with their values.

cases:
  - name: all_request_params_emitted
    description: |
      Single LLM call with all seven §6 declared RuntimeConfig fields
      set. The OTel observer emits each as the corresponding §5.5.2
      gen_ai.request.* attribute on the LLM provider span. The pre-0032
      four (temperature, max_tokens, top_p, seed) and the three new
      ones (frequency_penalty, presence_penalty, stop_sequences) MUST
      all appear; stop_sequences MUST be a string array.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: ask_llm
    nodes:
      ask_llm:
        calls_llm:
          messages: [{role: user, content: "hi"}]
          stores_response_in: msg
          config:
            temperature: 0.7
            max_tokens: 256
            top_p: 0.95
            seed: 42
            frequency_penalty: 0.3
            presence_penalty: 0.4
            stop_sequences: ["END", "STOP"]
    edges:
      - {from: ask_llm, to: END}
    initial_state: {}
    mock_llm:
      - status: 200
        body:
          id: cc-25
          object: chat.completion
          model: test-model
          choices:
            - {index: 0, message: {role: assistant, content: "ok"}, finish_reason: stop}
          usage: {prompt_tokens: 5, completion_tokens: 1, total_tokens: 6}
    expected:
      span_tree:
        - name: "openarmature.invocation"
          status: OK
          children:
            - name: "ask_llm"
              status: OK
              children:
                - name: "openarmature.llm.complete"
                  status: OK
                  attributes:
                    gen_ai.request.temperature: 0.7
                    gen_ai.request.max_tokens: 256
                    gen_ai.request.top_p: 0.95
                    gen_ai.request.seed: 42
                    gen_ai.request.frequency_penalty: 0.3
                    gen_ai.request.presence_penalty: 0.4
                    gen_ai.request.stop_sequences: ["END", "STOP"]
                  children: []
