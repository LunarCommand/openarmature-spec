# §3.4 namespace-collision rejection: caller-supplied metadata keys
# under reserved namespaces (openarmature.* and gen_ai.*) MUST be
# rejected at the invoke() API boundary, before any observer
# emission. Two cases cover both reserved prefixes.

cases:
  - name: rejects_openarmature_prefix
    description: |
      Caller supplies a metadata key under the reserved `openarmature.*`
      namespace. The framework MUST raise an API-boundary error before
      any work begins; no spans or Langfuse observations are produced.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: noop
    nodes:
      noop:
        update: {msg: "should never run"}
    edges:
      - {from: noop, to: END}
    initial_state: {}
    caller_metadata:
      tenantId: "acme-corp"
      openarmature.user.malicious: "x"
    expected:
      invoke_rejects_at_api_boundary: true
      # The harness asserts the framework raised before any work
      # began — no spans emitted, no Langfuse observations produced.
      no_spans_emitted: true
      no_langfuse_observations_emitted: true

  - name: rejects_gen_ai_prefix
    description: |
      Caller supplies a metadata key under the reserved `gen_ai.*`
      namespace (the OTel GenAI semconv prefix used by §5.5.2 request
      parameters). The framework MUST raise an API-boundary error
      before any work begins; no spans or Langfuse observations are
      produced.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: noop
    nodes:
      noop:
        update: {msg: "should never run"}
    edges:
      - {from: noop, to: END}
    initial_state: {}
    caller_metadata:
      tenantId: "acme-corp"
      gen_ai.system: "openai"
    expected:
      invoke_rejects_at_api_boundary: true
      no_spans_emitted: true
      no_langfuse_observations_emitted: true

  - name: rejects_reserved_oa_name_step
    description: |
      Caller supplies the bare key `step`, which exactly matches an
      OA-emitted top-level Langfuse metadata key name (§8.4.2). It is
      reserved per §3.4 (exact whole-key match, not a prefix), so the
      framework MUST reject at the invoke() boundary before any work
      begins — otherwise the caller value would silently overwrite the
      OA node step index in Langfuse's flat metadata.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: noop
    nodes:
      noop:
        update: {msg: "should never run"}
    edges:
      - {from: noop, to: END}
    initial_state: {}
    caller_metadata:
      tenantId: "acme-corp"
      step: "checkout"
    expected:
      invoke_rejects_at_api_boundary: true
      no_spans_emitted: true
      no_langfuse_observations_emitted: true

  - name: rejects_reserved_oa_name_correlation_id
    description: |
      Caller supplies the bare key `correlation_id`, a reserved OA-emitted
      metadata key name (§8.4.1 / §8.5). Reserved per §3.4; the framework
      MUST reject at the invoke() boundary.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: noop
    nodes:
      noop:
        update: {msg: "should never run"}
    edges:
      - {from: noop, to: END}
    initial_state: {}
    caller_metadata:
      tenantId: "acme-corp"
      correlation_id: "req-123"
    expected:
      invoke_rejects_at_api_boundary: true
      no_spans_emitted: true
      no_langfuse_observations_emitted: true

  - name: rejects_reserved_oa_name_system
    description: |
      Caller supplies the bare key `system`, a reserved OA-emitted
      generation-metadata key name (§8.4.3, sourced from `gen_ai.system`).
      Reserved per §3.4; MUST reject at the invoke() boundary. Distinct
      from the `gen_ai.*` PREFIX case above — here the bare key `system`
      collides with the Langfuse `generation.metadata.system` field.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: noop
    nodes:
      noop:
        update: {msg: "should never run"}
    edges:
      - {from: noop, to: END}
    initial_state: {}
    caller_metadata:
      tenantId: "acme-corp"
      system: "billing"
    expected:
      invoke_rejects_at_api_boundary: true
      no_spans_emitted: true
      no_langfuse_observations_emitted: true

  - name: rejects_reserved_oa_name_branch_name
    description: |
      Caller supplies the bare key `branch_name`, a reserved OA-emitted
      Observation-metadata key name added by proposal 0042 (§8.4.2 — per-
      branch Span observation; sibling to `fan_out_index`). Reserved per
      §3.4; the framework MUST reject at the invoke() boundary.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: noop
    nodes:
      noop:
        update: {msg: "should never run"}
    edges:
      - {from: noop, to: END}
    initial_state: {}
    caller_metadata:
      tenantId: "acme-corp"
      branch_name: "primary"
    expected:
      invoke_rejects_at_api_boundary: true
      no_spans_emitted: true
      no_langfuse_observations_emitted: true

  - name: rejects_reserved_oa_name_detached
    description: |
      Caller supplies the bare key `detached`, a reserved OA-emitted
      Observation-metadata key name added by proposal 0042 (§8.4.2 — the
      dispatching observation flag for detached subgraph / fan-out
      instance per §4.4). Reserved per §3.4; the framework MUST reject at
      the invoke() boundary.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: noop
    nodes:
      noop:
        update: {msg: "should never run"}
    edges:
      - {from: noop, to: END}
    initial_state: {}
    caller_metadata:
      tenantId: "acme-corp"
      detached: true
    expected:
      invoke_rejects_at_api_boundary: true
      no_spans_emitted: true
      no_langfuse_observations_emitted: true

  - name: rejects_reserved_oa_name_detached_from_invocation_id
    description: |
      Caller supplies the bare key `detached_from_invocation_id`, a
      reserved OA-emitted Trace-metadata key name added by proposal 0042
      (§8.4.1 — emitted on the detached child trace pointing back to the
      parent invocation). Reserved per §3.4; the framework MUST reject at
      the invoke() boundary.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: noop
    nodes:
      noop:
        update: {msg: "should never run"}
    edges:
      - {from: noop, to: END}
    initial_state: {}
    caller_metadata:
      tenantId: "acme-corp"
      detached_from_invocation_id: "parent-invoke-abc"
    expected:
      invoke_rejects_at_api_boundary: true
      no_spans_emitted: true
      no_langfuse_observations_emitted: true

  - name: rejects_reserved_name_via_set_invocation_metadata
    description: |
      A node body calls the mid-invocation helper with a reserved
      OA-emitted name (`step`) via the augment_metadata primitive (per
      fixture 034). Per §3.4 the helper MUST raise at the call site — the
      reservation is enforced at the helper, not only at the invoke()
      boundary — so a reserved name cannot be introduced mid-invocation.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: augment
    nodes:
      augment:
        update: {msg: "unreached"}
        # Harness primitive (per fixture 034): call
        # set_invocation_metadata(step="checkout") at the top of the body.
        augment_metadata:
          step: "checkout"
    edges:
      - {from: augment, to: END}
    initial_state: {}
    caller_metadata:
      tenantId: "acme-corp"
    expected:
      # §3.4: the helper raises at the call site on a reserved name,
      # before the reserved key reaches any emission.
      augment_rejects_at_call_site: true

  - name: rejects_reserved_oa_name_implementation_name
    description: |
      Caller supplies the bare key `implementation_name`, a reserved
      OA-emitted Trace-metadata key name added by proposal 0052
      (§8.4.1 — sourced from `openarmature.implementation.name` per
      §5.1; an implementation-emitted runtime-identity constant that
      MUST NOT be shadowable by caller-supplied metadata). Reserved
      per §3.4; the framework MUST reject at the invoke() boundary.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: noop
    nodes:
      noop:
        update: {msg: "should never run"}
    edges:
      - {from: noop, to: END}
    initial_state: {}
    caller_metadata:
      tenantId: "acme-corp"
      implementation_name: "spoof-impl"
    expected:
      invoke_rejects_at_api_boundary: true
      no_spans_emitted: true
      no_langfuse_observations_emitted: true

  - name: rejects_reserved_oa_name_implementation_version
    description: |
      Caller supplies the bare key `implementation_version`, a reserved
      OA-emitted Trace-metadata key name added by proposal 0052
      (§8.4.1 — sourced from `openarmature.implementation.version`
      per §5.1; an implementation-emitted runtime-identity constant
      that MUST NOT be shadowable by caller-supplied metadata).
      Reserved per §3.4; the framework MUST reject at the invoke()
      boundary.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: noop
    nodes:
      noop:
        update: {msg: "should never run"}
    edges:
      - {from: noop, to: END}
    initial_state: {}
    caller_metadata:
      tenantId: "acme-corp"
      implementation_version: "9.9.9"
    expected:
      invoke_rejects_at_api_boundary: true
      no_spans_emitted: true
      no_langfuse_observations_emitted: true
