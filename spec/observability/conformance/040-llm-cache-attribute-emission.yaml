# §5.5.3.1 OA-namespaced cache attributes — cache hit case. The provider
# response carries usage.prompt_tokens_details.cached_tokens = 42; the
# LLM provider span MUST emit
# openarmature.llm.cache_read.input_tokens = 42 and MUST NOT emit
# openarmature.llm.cache_creation.input_tokens (OpenAI-compatible
# providers leave the §6 cache_creation_tokens field absent per §8.1.2).

cases:
  - name: llm_cache_read_attribute_present
    description: |
      A complete() call whose provider response surfaces a non-zero
      prompt-cache hit count. Per §8.1.2 the OpenAI-compatible mapping
      sources Response.usage.cached_tokens from
      usage.prompt_tokens_details.cached_tokens; per §5.5.3.1 the
      OTel observer projects that to
      openarmature.llm.cache_read.input_tokens on the LLM provider
      span. The cache_creation counterpart is absent (OpenAI-compatible
      providers do not source it).
    state:
      fields:
        answer:
          type: string
          default: ""
    entry: ask
    nodes:
      ask:
        calls_llm:
          messages: [{role: user, content: "Summarize."}]
          stores_response_in: answer
    edges:
      - {from: ask, to: END}
    initial_state: {}
    mock_llm:
      - status: 200
        body:
          id: cc-040
          object: chat.completion
          model: gpt-test
          choices:
            - {index: 0, message: {role: assistant, content: "Done."}, finish_reason: stop}
          usage:
            prompt_tokens: 100
            completion_tokens: 5
            total_tokens: 105
            prompt_tokens_details:
              cached_tokens: 42
    expected:
      response_usage:
        prompt_tokens: 100
        completion_tokens: 5
        total_tokens: 105
        cached_tokens: 42
        cache_creation_tokens: null
      llm_span_attributes:
        "openarmature.llm.cache_read.input_tokens": 42
      llm_span_attributes_absent:
        - "openarmature.llm.cache_creation.input_tokens"
      invariants:
        cache_read_attribute_equals_usage_field: true
        cache_creation_attribute_absent_for_openai_compatible: true
