# §5.5.3.1 OA-namespaced cache attributes — "reported miss" case. The
# provider response carries usage.prompt_tokens_details.cached_tokens = 0
# (the provider reported zero cache-hit tokens, distinct from the absent
# case in fixture 041). The §6 Response.usage.cached_tokens MUST be 0
# (not null), and the OTel observer MUST emit
# openarmature.llm.cache_read.input_tokens = 0 (not omit). The
# absent-vs-zero distinction is observable across both surfaces.

cases:
  - name: llm_cache_attribute_emits_reported_zero
    description: |
      A complete() call whose provider response surfaces a cache field
      with explicit value 0 — the provider reported that the prompt was
      eligible for cache reporting but produced no hits. Per §6,
      Response.usage.cached_tokens is 0 (not null); per §5.5.3.1 the
      LLM provider span carries
      openarmature.llm.cache_read.input_tokens = 0. The OpenAI-compatible
      provider does not source the cache-creation field per §8.1.2.
    state:
      fields:
        answer:
          type: string
          default: ""
    entry: ask
    nodes:
      ask:
        calls_llm:
          messages: [{role: user, content: "Summarize."}]
          stores_response_in: answer
    edges:
      - {from: ask, to: END}
    initial_state: {}
    mock_llm:
      - status: 200
        body:
          id: cc-042
          object: chat.completion
          model: gpt-test
          choices:
            - {index: 0, message: {role: assistant, content: "Done."}, finish_reason: stop}
          usage:
            prompt_tokens: 100
            completion_tokens: 5
            total_tokens: 105
            prompt_tokens_details:
              cached_tokens: 0
    expected:
      response_usage:
        prompt_tokens: 100
        completion_tokens: 5
        total_tokens: 105
        cached_tokens: 0
        cache_creation_tokens: null
      llm_span_attributes:
        "openarmature.llm.cache_read.input_tokens": 0
      llm_span_attributes_absent:
        - "openarmature.llm.cache_creation.input_tokens"
      invariants:
        cache_read_attribute_emits_zero_when_reported: true
        reported_zero_distinct_from_absent: true
