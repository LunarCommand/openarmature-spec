# graph-engine §6 LlmCompletionEvent.request_params — observability
# §5.5.2 GenAI request-parameter family bundled into a mapping with
# absence-is-meaningful semantics. Verifies proposal 0057.

cases:
  - name: request_params_populated_with_supplied_subset
    description: |
      Call passes RuntimeConfig with temperature=0.7 and max_tokens=512;
      no other §5.5.2 parameters supplied. The typed event's
      request_params carries exactly those two keys; the other five
      §5.5.2 parameters (top_p, seed, frequency_penalty, presence_penalty,
      stop_sequences) MUST NOT appear in the mapping per the
      absence-is-meaningful rule.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: ask_llm
    nodes:
      ask_llm:
        calls_llm:
          messages: [{role: user, content: "hi"}]
          stores_response_in: msg
          config:
            temperature: 0.7
            max_tokens: 512
    edges:
      - {from: ask_llm, to: END}
    initial_state: {}
    mock_llm:
      - status: 200
        body:
          id: cc-062
          object: chat.completion
          model: test-model
          choices:
            - {index: 0, message: {role: assistant, content: "ok"}, finish_reason: stop}
          usage: {prompt_tokens: 5, completion_tokens: 1, total_tokens: 6}
    typed_observers:
      - name: collector
        kind: typed_event_collector
    expected:
      observers:
        collector:
          contains_event:
            event_type: LlmCompletionEvent
            fields:
              request_params:
                temperature: 0.7
                max_tokens: 512
            fields_absent_keys:
              request_params: [top_p, seed, frequency_penalty, presence_penalty, stop_sequences]
      invariants:
        request_params_carries_only_caller_supplied_keys: true
        absence_distinct_from_zero_value: true
