# graph-engine §6 LlmCompletionEvent.request_extras — RuntimeConfig
# extras pass-through bag in typed-event-native mapping form (not the
# JSON-encoded string form §5.5.1 emits on the OTel span). Verifies
# proposal 0057.

cases:
  - name: request_extras_populated_as_native_mapping
    description: |
      Call passes RuntimeConfig with one extras field (repetition_penalty,
      a provider-specific sampling parameter). The typed event's
      request_extras carries the mapping natively (not as a JSON-encoded
      string).
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: ask_llm
    nodes:
      ask_llm:
        calls_llm:
          messages: [{role: user, content: "hi"}]
          stores_response_in: msg
          config:
            temperature: 0.7
            extras:
              repetition_penalty: 1.05
    edges:
      - {from: ask_llm, to: END}
    initial_state: {}
    mock_llm:
      - status: 200
        body:
          id: cc-063
          object: chat.completion
          model: test-model
          choices:
            - {index: 0, message: {role: assistant, content: "ok"}, finish_reason: stop}
          usage: {prompt_tokens: 5, completion_tokens: 1, total_tokens: 6}
    typed_observers:
      - name: collector
        kind: typed_event_collector
    expected:
      observers:
        collector:
          contains_event:
            event_type: LlmCompletionEvent
            fields:
              request_extras:
                repetition_penalty: 1.05
      invariants:
        request_extras_is_native_mapping_not_json_string: true
