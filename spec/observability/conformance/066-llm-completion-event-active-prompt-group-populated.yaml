# graph-engine §6 LlmCompletionEvent.active_prompt_group — snapshot of
# the active PromptGroup identity at LLM-call time. Verifies proposal
# 0057.
#
# Per-directory directive (per conformance-adapter §3.2): this fixture
# introduces `renders_prompt_group:` on a node. Semantics: the adapter
# constructs a PromptGroup from the explicit `members` list (an ordered
# sequence of two or more prompts defined in `prompt_backend.prompts`,
# per prompt-management §10's two-or-more-members rule), makes that group
# the active PromptGroup context, sets the named `active_prompt` member as
# the active Prompt context, then invokes the LLM. Both bindings are torn
# down when the node returns.

cases:
  - name: active_prompt_group_populated_when_call_inside_group_context
    description: |
      Graph with one LLM-calling node that renders a prompt inside a
      PromptGroup context (using the per-directory renders_prompt_group:
      directive). The typed event's active_prompt carries the active
      member's identity; active_prompt_group carries the group_name.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: ask_llm
    nodes:
      ask_llm:
        renders_prompt_group:
          group_name: "classification_pipeline"
          members: [classify, summarize]
          active_prompt: classify
        calls_llm:
          stores_response_in: msg
    edges:
      - {from: ask_llm, to: END}
    initial_state: {}
    prompt_backend:
      type: filesystem
      prompts:
        classify:
          name: classify
          version: "v7"
          label: production
          template: "classify this: {{topic}}"
          template_hash: "abc123"
        summarize:
          name: summarize
          version: "v3"
          label: production
          template: "summarize: {{topic}}"
          template_hash: "def456"
    render_variables:
      topic: "weather"
    mock_llm:
      - status: 200
        body:
          id: cc-066
          object: chat.completion
          model: test-model
          choices:
            - {index: 0, message: {role: assistant, content: "topic-A"}, finish_reason: stop}
          usage: {prompt_tokens: 5, completion_tokens: 1, total_tokens: 6}
    typed_observers:
      - name: collector
        kind: typed_event_collector
    expected:
      observers:
        collector:
          contains_event:
            event_type: LlmCompletionEvent
            fields:
              active_prompt:
                name: "classify"
                version: "v7"
                label: "production"
                template_hash: "abc123"
                rendered_hash: "<any-string>"
              active_prompt_group:
                group_name: "classification_pipeline"
      invariants:
        active_prompt_and_group_both_populated_inside_group_context: true
