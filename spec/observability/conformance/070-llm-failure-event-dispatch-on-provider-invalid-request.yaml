# graph-engine §6 LlmFailedEvent dispatch on provider_invalid_request.
# Verifies proposal 0058's dispatch contract on a different §7
# category (pre-send validation failure raised by the impl's
# request-validation layer before contacting the provider). Asserts
# error_category populated correctly across category values.

cases:
  - name: llm_failure_event_dispatched_on_provider_invalid_request
    description: |
      Graph node sends a malformed message — a tool-role message whose
      tool_call_id matches no earlier assistant ToolCall (per llm-provider
      §3). The id is present, so the message is constructible in every
      impl; the cross-message matching check at the complete() boundary
      raises provider_invalid_request before contacting the provider. The
      typed event MUST fire with error_category set accordingly.
    state:
      fields:
        answer:
          type: string
          default: ""
    entry: ask
    nodes:
      ask:
        calls_llm:
          # Malformed: the tool-role message carries a tool_call_id that
          # matches no earlier assistant ToolCall (per llm-provider §3).
          # The id is present (so the message is constructible in every
          # impl), but unmatched — the cross-message matching check at the
          # complete() boundary raises provider_invalid_request before any
          # wire contact.
          messages:
            - {role: tool, content: "result from earlier call", tool_call_id: "call_unmatched"}
          stores_response_in: answer
    edges:
      - {from: ask, to: END}
    initial_state: {}
    typed_observers:
      - name: collector
        kind: typed_event_collector
    expected_error:
      category: provider_invalid_request
      raised_from: ask
    expected:
      observers:
        collector:
          contains_event:
            event_type: LlmFailedEvent
            fields:
              error_category: provider_invalid_request
              node_name: ask
              namespace: [ask]
              attempt_index: 0
              fan_out_index: null
              branch_name: null
          event_count:
            event_type: LlmCompletionEvent
            count: 0
      invariants:
        exactly_one_llm_failed_event_observed: true
        error_category_matches_raised_exception_category: true
