# graph-engine §6 LlmFailedEvent.error_type — OPTIONAL impl-level /
# vendor-specific error type or code. The field contract is permissive:
# either a vendor error code or an upstream exception class name
# satisfies it, and null is valid when no impl-side type is available.
# These cases assert the PERMISSIVE contract — error_type is a non-empty
# string (populated) or null — not a verbatim per-style value, so an impl
# that picks either sourcing style conforms.

cases:
  - name: error_type_populated_with_vendor_code_style
    description: |
      Provider raises provider_rate_limit; the mocked vendor body carries
      an error code. The typed event carries the normative error_category
      and a populated (non-empty) error_type. The fixture asserts
      error_type is populated, NOT a verbatim value — a vendor code or an
      exception class name both satisfy the contract.
    state:
      fields:
        answer:
          type: string
          default: ""
    entry: ask
    nodes:
      ask:
        calls_llm:
          messages: [{role: user, content: "hi"}]
          stores_response_in: answer
    edges:
      - {from: ask, to: END}
    initial_state: {}
    mock_llm:
      - status: 429
        body:
          error:
            type: rate_limit_exceeded
            message: "rate limit exceeded; retry after 60s"
    typed_observers:
      - name: collector
        kind: typed_event_collector
    expected_error:
      category: provider_rate_limit
      raised_from: ask
    expected:
      observers:
        collector:
          contains_event:
            event_type: LlmFailedEvent
            fields:
              error_category: provider_rate_limit
              error_type: "<any-string>"

  - name: error_type_populated_with_exception_class_name_style
    description: |
      Provider raises provider_rate_limit; the mocked vendor body carries
      a class-name-style type. Like case 1, the fixture asserts error_type
      is populated (non-empty) regardless of how the impl sources it; it
      does not pin the sourcing style.
    state:
      fields:
        answer:
          type: string
          default: ""
    entry: ask
    nodes:
      ask:
        calls_llm:
          messages: [{role: user, content: "hi"}]
          stores_response_in: answer
    edges:
      - {from: ask, to: END}
    initial_state: {}
    mock_llm:
      - status: 429
        body:
          error:
            type: RateLimitError
            message: "rate limit exceeded"
    typed_observers:
      - name: collector
        kind: typed_event_collector
    expected_error:
      category: provider_rate_limit
      raised_from: ask
    expected:
      observers:
        collector:
          contains_event:
            event_type: LlmFailedEvent
            fields:
              error_category: provider_rate_limit
              error_type: "<any-string>"

  - name: error_type_null_when_no_impl_side_type_available
    description: |
      Provider raises a §7 category exception with no impl-side type
      to surface. The typed event carries error_category populated
      (always required) and error_type=null. Spec text mandates
      error_type is OPTIONAL — null is valid when no vendor or
      class-level detail is available.
    state:
      fields:
        answer:
          type: string
          default: ""
    entry: ask
    nodes:
      ask:
        calls_llm:
          messages: [{role: user, content: "hi"}]
          stores_response_in: answer
    edges:
      - {from: ask, to: END}
    initial_state: {}
    mock_llm:
      - status: 503
        body:
          # No `error.type` field — the impl surfaces error_type=null.
          error: {message: "service unavailable"}
    typed_observers:
      - name: collector
        kind: typed_event_collector
    expected_error:
      category: provider_unavailable
      raised_from: ask
    expected:
      observers:
        collector:
          contains_event:
            event_type: LlmFailedEvent
            fields:
              error_category: provider_unavailable
              error_type: null
