# §5.5.10 (proposal 0076): openarmature.llm.tool_calls.{count,names,ids} are
# identity attributes, NOT payload — they are ungated by disable_provider_payload
# and render even in the default payload-off posture, while the tool ARGUMENTS
# stay in the gated openarmature.llm.output.content (§5.5.1 / §5.5.4).

cases:
  - name: tool_call_attrs_present_with_payload_disabled
    description: |
      disable_provider_payload=True (the default). The tool-call request
      attributes (count / names / ids) still render — they are identifiers, not
      payload — while openarmature.llm.output.content (carrying the serialized
      arguments) is suppressed.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: ask_llm
    nodes:
      ask_llm:
        calls_llm:
          messages: [{role: user, content: "search please"}]
          stores_response_in: msg
    edges:
      - {from: ask_llm, to: END}
    initial_state: {}
    mock_llm:
      - status: 200
        body:
          id: cc-087a
          object: chat.completion
          created: 1700000000
          model: test-model
          choices:
            - index: 0
              message:
                role: assistant
                content: null
                tool_calls:
                  - {id: call_x, type: function, function: {name: search_db, arguments: '{"q": "secret query"}'}}
              finish_reason: tool_calls
          usage: {prompt_tokens: 6, completion_tokens: 5, total_tokens: 11}
    disable_provider_payload: true
    expected:
      span_tree:
        - name: "openarmature.invocation"
          status: OK
          children:
            - name: "ask_llm"
              status: OK
              children:
                - name: "openarmature.llm.complete"
                  status: OK
                  attributes:
                    openarmature.llm.tool_calls.count: 1
                    openarmature.llm.tool_calls.names: ["search_db"]
                    openarmature.llm.tool_calls.ids: ["call_x"]
                  attributes_absent:
                    - "openarmature.llm.output.content"
                  children: []
      invariants:
        tool_call_attrs_survive_payload_off: true
        tool_arguments_remain_gated_in_output_content: true

  - name: tool_call_attrs_present_with_payload_enabled
    description: |
      disable_provider_payload=False. The same tool-call request attributes
      render identically (flag-independent), confirming they are not gated by the
      payload flag; the output payload is additionally populated.
    state:
      fields:
        msg:
          type: string
          default: ""
    entry: ask_llm
    nodes:
      ask_llm:
        calls_llm:
          messages: [{role: user, content: "search please"}]
          stores_response_in: msg
    edges:
      - {from: ask_llm, to: END}
    initial_state: {}
    mock_llm:
      - status: 200
        body:
          id: cc-087b
          object: chat.completion
          created: 1700000000
          model: test-model
          choices:
            - index: 0
              message:
                role: assistant
                content: null
                tool_calls:
                  - {id: call_x, type: function, function: {name: search_db, arguments: '{"q": "secret query"}'}}
              finish_reason: tool_calls
          usage: {prompt_tokens: 6, completion_tokens: 5, total_tokens: 11}
    disable_provider_payload: false
    expected:
      span_tree:
        - name: "openarmature.invocation"
          status: OK
          children:
            - name: "ask_llm"
              status: OK
              children:
                - name: "openarmature.llm.complete"
                  status: OK
                  attributes:
                    openarmature.llm.tool_calls.count: 1
                    openarmature.llm.tool_calls.names: ["search_db"]
                    openarmature.llm.tool_calls.ids: ["call_x"]
                  children: []
      invariants:
        tool_call_attrs_present_regardless_of_payload_flag: true
        output_content_present_when_payload_enabled: true
