# observability §8.4.7 (proposal 0089): a RerankFailedEvent renders an
# ERROR-level `Retriever` observation (NOT a Generation, NOT a success). Via the
# generic §4.2 / §8.4.2 error mapping, the failure observation carries
# observation.level = ERROR and observation.statusMessage = the §7 error_category,
# with error_type / error_message in metadata — mirroring §8.4.6's tool failure
# (fixture 098) and the embedding-failure sibling (fixture 137). The failure
# observation carries NO `output` (no response was received), regardless of the
# payload flag. The request-side identity metadata known at dispatch
# (openarmature_query_length / openarmature_document_count / openarmature_top_k)
# survives; the response-derived metadata (openarmature_result_count /
# openarmature_response_id) does not.
#
# Two cases gate disable_provider_payload to show that `output` is absent because
# no response was received — not merely payload-gated: it stays null even with the
# flag off, while the request-side `input` ({query, documents}) populates as in
# the success fixture 108.
#
# Failure trigger: mock_rerank returns HTTP 503, which the implementation
# classifies as provider_unavailable (per fixture 100's directive vocabulary).
# The mock body supplies a vendor `type` + `message`, so error_type / error_message
# surface non-empty in metadata (asserted by format, not literal, per the
# fixture-073 vendor-error-type idiom — error_type's value is impl-derived).

cases:
  - name: rerank_failure_renders_error_level_observation_payload_suppressed
    description: |
      One rerank call that fails (mock returns 503 -> provider_unavailable).
      Default Langfuse observer config (disable_provider_payload=True). The
      Retriever observation MUST emit at ERROR level with statusMessage =
      "provider_unavailable" (the §7 error_category), error_type /
      error_message in metadata, and the request-side openarmature_query_length
      / openarmature_document_count / openarmature_top_k; input is suppressed
      (payload gated) and there is NO output (no response received). The
      observation type is "retriever" (NOT "generation").
    state:
      fields:
        rerank_response:
          type: record
          default: null
    entry: rerank_node
    nodes:
      rerank_node:
        calls_rerank:
          query: "paris"
          documents: ["doc one", "doc two"]
          top_k: 2
          stores_response_in: rerank_response
    edges:
      - {from: rerank_node, to: END}
    initial_state: {}
    mock_rerank:
      - status: 503
        body:
          error:
            message: "service unavailable"
            type: "server_error"
    langfuse_observer:
      disable_provider_payload: true
    expected_error:
      category: provider_unavailable
      raised_from: rerank_node
    expected:
      langfuse_trace:
        id: "<uuid-hex>"
        observations:
          - type: span
            name: "rerank_node"
            children:
              - type: retriever
                name: "openarmature.rerank.complete"
                level: ERROR
                statusMessage: "provider_unavailable"
                input: null
                output: null
                metadata:
                  openarmature_query_length: 5
                  openarmature_document_count: 2
                  openarmature_top_k: 2
                  error_type: "<any-string>"
                  error_message: "<any-string>"
                children: []
      invariants:
        rerank_failure_renders_error_level: true
        error_category_is_status_message: true
        error_type_and_message_in_metadata: true
        failure_observation_carries_no_output: true
        renders_as_retriever_observation_not_generation: true

  - name: rerank_failure_no_output_even_with_payload_flag_off
    description: |
      The same rerank failure with disable_provider_payload=False. The
      request-side `input` populates ({query, documents}, as in success
      fixture 108's flag-off case), but `output` is STILL null — no response
      was received, so the absence is intrinsic, not a payload-gating artifact.
      ERROR level, statusMessage, and the error metadata are unchanged by the
      flag.
    state:
      fields:
        rerank_response:
          type: record
          default: null
    entry: rerank_node
    nodes:
      rerank_node:
        calls_rerank:
          query: "paris"
          documents: ["doc one", "doc two"]
          top_k: 2
          stores_response_in: rerank_response
    edges:
      - {from: rerank_node, to: END}
    initial_state: {}
    mock_rerank:
      - status: 503
        body:
          error:
            message: "service unavailable"
            type: "server_error"
    langfuse_observer:
      disable_provider_payload: false
    expected_error:
      category: provider_unavailable
      raised_from: rerank_node
    expected:
      langfuse_trace:
        id: "<uuid-hex>"
        observations:
          - type: span
            name: "rerank_node"
            children:
              - type: retriever
                name: "openarmature.rerank.complete"
                level: ERROR
                statusMessage: "provider_unavailable"
                input:
                  query: "paris"
                  documents: ["doc one", "doc two"]
                output: null
                metadata:
                  openarmature_query_length: 5
                  openarmature_document_count: 2
                  openarmature_top_k: 2
                  error_type: "<any-string>"
                  error_message: "<any-string>"
                children: []
      invariants:
        no_output_even_with_payload_flag_off: true
        request_side_input_populated_when_payload_flag_disabled: true
        error_level_and_status_message_unchanged_by_payload_flag: true
