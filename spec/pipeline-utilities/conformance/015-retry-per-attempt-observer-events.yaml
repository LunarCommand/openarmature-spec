# Per-attempt observer events. Each retry attempt produces a started/completed
# event pair from the engine (per graph-engine §6's pair model, established by
# proposal 0005). Net result for a 3-attempt retry: 6 events (3 pairs) with
# attempt_index 0/1/2.
#
# Verifies the graph-engine §6 contract:
#   - phase field on every event
#   - attempt_index field on the node event shape
#   - engine dispatches all events; retry middleware does not dispatch directly

state:
  fields:
    v:
      type: int
      default: 0
    trace:
      type: list<string>
      reducer: append
      default: []

entry: target

nodes:
  target:
    flaky:
      failure_sequence:
        - {transient: true, category: provider_rate_limit, message: "throttle 1"}
        - {transient: true, category: provider_rate_limit, message: "throttle 2"}
      success_update: {v: 7, trace: ["target"]}

edges:
  - {from: target, to: END}

initial_state: {}

middleware:
  per_node:
    target:
      - type: retry
        max_attempts: 3
        backoff: {type: deterministic, seconds: 0}

observers:
  - {name: obs, attach: graph, target: outer, behavior: record}

expected:
  final_state: {v: 7, trace: ["target"]}
  execution_order: [target]

  observer_events:
    obs:
      # Six events for a 3-attempt retry — one pair per attempt. All share
      # node_name, namespace, step, pre_state, parent_states. Distinguished
      # by (attempt_index, phase).
      - {step: 0, phase: started,   node_name: target, attempt_index: 0, namespace: [target],
         pre_state: {v: 0, trace: []}, parent_states: []}
      - {step: 0, phase: completed, node_name: target, attempt_index: 0, namespace: [target],
         pre_state: {v: 0, trace: []}, error: node_exception, parent_states: []}
      - {step: 0, phase: started,   node_name: target, attempt_index: 1, namespace: [target],
         pre_state: {v: 0, trace: []}, parent_states: []}
      - {step: 0, phase: completed, node_name: target, attempt_index: 1, namespace: [target],
         pre_state: {v: 0, trace: []}, error: node_exception, parent_states: []}
      - {step: 0, phase: started,   node_name: target, attempt_index: 2, namespace: [target],
         pre_state: {v: 0, trace: []}, parent_states: []}
      - {step: 0, phase: completed, node_name: target, attempt_index: 2, namespace: [target],
         pre_state: {v: 0, trace: []},
         post_state: {v: 7, trace: ["target"]}, parent_states: []}
