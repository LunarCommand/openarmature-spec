# Parallel branches — one branch wraps its subgraph with retry middleware.
# Branch A's subgraph raises a transient exception on its first attempt and
# succeeds on the second; branches B and C complete normally on first try.
# Verifies §11.7 branch middleware: per-branch retry works without affecting
# sibling branches.

subgraphs:
  flaky_a:
    state:
      fields:
        a_out:
          type: int
          default: 0
    entry: a
    nodes:
      a:
        flaky:
          failure_sequence:
            - {transient: true, category: provider_rate_limit, message: "throttle"}
          success_update: {a_out: 1}
    edges:
      - {from: a, to: END}

  steady_b:
    state:
      fields:
        b_out:
          type: int
          default: 0
    entry: b
    nodes:
      b:
        update: {b_out: 2}
    edges:
      - {from: b, to: END}

  steady_c:
    state:
      fields:
        c_out:
          type: int
          default: 0
    entry: c
    nodes:
      c:
        update: {c_out: 3}
    edges:
      - {from: c, to: END}

state:
  fields:
    alpha_result:
      type: int
      default: 0
    beta_result:
      type: int
      default: 0
    gamma_result:
      type: int
      default: 0

entry: dispatcher

nodes:
  dispatcher:
    parallel_branches:
      branches:
        alpha:
          subgraph: flaky_a
          outputs:
            alpha_result: a_out
          middleware:
            - type: retry
              max_attempts: 3
              backoff: {type: deterministic, seconds: 0}
        beta:
          subgraph: steady_b
          outputs:
            beta_result: b_out
        gamma:
          subgraph: steady_c
          outputs:
            gamma_result: c_out

edges:
  - {from: dispatcher, to: END}

initial_state: {}

observers:
  - {name: obs, attach: graph, target: outer, behavior: record}

expected:
  # Alpha succeeds after one retry; beta and gamma complete normally on
  # their first attempt. All three contributions land.
  final_state:
    alpha_result: 1
    beta_result: 2
    gamma_result: 3

  execution_order: [dispatcher]

  # Branch alpha's inner node executes twice (first attempt raised,
  # second attempt succeeded under the branch's retry middleware).
  # Branches beta and gamma execute their inner node exactly once.
  # Per-branch middleware retry is independent of sibling branches'
  # execution.
  #
  # We assert event counts rather than `attempt_index` values: per
  # graph-engine §6, `attempt_index` increments only on events from
  # nodes wrapped DIRECTLY by retry middleware. The branch's retry
  # middleware wraps the WHOLE subgraph invocation (per §11.7),
  # not the inner node itself — so inner-node events MUST emit with
  # `attempt_index = 0` even when the wrapping retry re-runs the
  # subgraph. The retry is observable here as a count of inner-node
  # events (alpha's `a` fires 2 attempts × 2 phases = 4 events;
  # beta and gamma fire 1 attempt × 2 phases = 2 events each).
  # Matches fixture 021's pattern for the analogous fan-out
  # `instance_middleware` case.
  observer_event_invariants:
    alpha_inner_a_event_count: 4
    beta_inner_b_event_count: 2
    gamma_inner_c_event_count: 2
