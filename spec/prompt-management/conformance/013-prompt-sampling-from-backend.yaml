# §3 Prompt.sampling propagation: a backend that populates the new
# typed sub-record must surface it on the returned Prompt; the manager
# propagates it through render to PromptResult unchanged.

backends:
  - name: local
    prompts:
      - name: classify
        label: production
        version: v1
        template: "Classify: {{ topic }}"
        template_hash: "sha256:classify-v1"
        sampling:
          temperature: 0.0
          max_tokens: 256
          top_p: 0.95
          seed: 42
          frequency_penalty: 0.1
          presence_penalty: 0.2
          stop_sequences: ["END"]
          extras:
            repetition_penalty: 1.05

manager:
  backends: [local]

calls:
  - target: manager
    operation: fetch
    name: classify
    label: production
    capture_as: prompt
  - target: manager
    operation: render
    fetched_prompt_ref: prompt
    variables: {topic: "weather"}
    capture_as: rendered

expected:
  # The Prompt.sampling sub-record carries every supplied field verbatim,
  # including the extras mapping.
  prompt:
    name: classify
    label: production
    version: v1
    sampling:
      temperature: 0.0
      max_tokens: 256
      top_p: 0.95
      seed: 42
      frequency_penalty: 0.1
      presence_penalty: 0.2
      stop_sequences: ["END"]
      extras:
        repetition_penalty: 1.05
  # PromptResult.sampling is propagated verbatim from the source Prompt.
  rendered:
    name: classify
    label: production
    sampling:
      temperature: 0.0
      max_tokens: 256
      top_p: 0.95
      seed: 42
      frequency_penalty: 0.1
      presence_penalty: 0.2
      stop_sequences: ["END"]
      extras:
        repetition_penalty: 1.05
