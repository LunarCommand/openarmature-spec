# §3.1 + §6.render — content-blocks render (inline image). A
# chat_template with a single user segment whose content-blocks has
# one inline-source image block (with templated base64_data and
# media_type). Render produces a 1-Message PromptResult; the user
# Message's content is a 1-block sequence with the substituted inline
# image.

backends:
  - name: local
    prompts:
      - name: classify_uploaded_image
        label: production
        version: v1
        chat_template:
          - role: user
            content:
              - type: image
                source:
                  type: inline
                  base64_data: "{{ img_b64 }}"
                media_type: "{{ img_media_type }}"
        template_hash: "sha256:classify-uploaded-image-v1"

cases:
  - name: content_blocks_inline_image_render
    description: |
      Single user segment with one inline-source image block; the
      base64_data and media_type fields are per-block templates.
      Render with variables={img_b64:
      "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=",
      img_media_type: "image/png"}. Asserts the resulting message has
      one user Message whose content is a 1-block sequence containing
      one image block with `inline`-source carrying the substituted
      base64 data and media_type per llm-provider §3.1.3.
    manager:
      backends: [local]
    calls:
      - target: manager
        operation: render
        fetched_prompt: {name: classify_uploaded_image, label: production}
        variables:
          img_b64: "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
          img_media_type: "image/png"
        capture_as: rendered
    expected:
      rendered:
        name: classify_uploaded_image
        version: v1
        label: production
        messages:
          - role: user
            content:
              - type: image
                source:
                  type: inline
                  base64_data: "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
                media_type: "image/png"
