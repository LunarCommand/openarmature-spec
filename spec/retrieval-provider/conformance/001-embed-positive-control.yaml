# retrieval-provider §3 + §4 — EmbeddingProvider.embed() positive control.
# Verifies the response shape contract: vectors length matches input
# length, all inner vectors share dimensionality, dimensions field
# matches inner-vector length, usage.input_tokens populated, request_id
# populated when the provider returns one.
#
# Per-directory harness directive (per conformance-adapter §3.2):
#
# - calls_embed: {input: [...], stores_response_in: <field>} —
#   node calls the bound EmbeddingProvider's embed() with the given
#   input list and stores the resulting EmbeddingResponse record in
#   the named state field.
#
# Per-directory suite-level harness directive:
#
# - mock_embedding: [{status, body}, ...] — mock provider responses
#   matching the OpenAI-compatible /v1/embeddings shape. Each entry
#   is dispatched for one embed() call in arrival order.
#
# Mock-shape note: this fixture's body uses a top-level `id` field
# as the source for `EmbeddingResponse.response_id`. The mock shape
# is harness-internal — the v1 retrieval-provider spec does not pin
# the wire path that produces `response_id`. A forthcoming per-vendor
# wire-format mapping proposal (analogous to llm-provider §8.1 /
# §8.2 / §8.3) will pin the actual wire-source per provider; this
# fixture's `id` field is a stand-in pending that work.

cases:
  - name: embed_response_shape_invariants_satisfied
    description: |
      Bound EmbeddingProvider with mocked /v1/embeddings response
      returning 3 vectors for 3 input strings, dimensions=4, with
      a provider-returned request id and usage.prompt_tokens. The
      harness asserts the response carries:
      - vectors length = 3
      - all inner vectors of length 4
      - dimensions field = 4
      - usage.input_tokens = 6
      - response_id = "emb-001-id"
    state:
      fields:
        embedding_response:
          type: record
          default: null
    entry: embed_node
    nodes:
      embed_node:
        calls_embed:
          input: ["alpha", "beta", "gamma"]
          stores_response_in: embedding_response
    edges:
      - {from: embed_node, to: END}
    initial_state: {}
    mock_embedding:
      - status: 200
        body:
          object: list
          model: text-embedding-test
          id: emb-001-id
          data:
            - {object: embedding, index: 0, embedding: [0.1, 0.2, 0.3, 0.4]}
            - {object: embedding, index: 1, embedding: [0.5, 0.6, 0.7, 0.8]}
            - {object: embedding, index: 2, embedding: [0.9, 1.0, 1.1, 1.2]}
          usage:
            prompt_tokens: 6
            total_tokens: 6
    expected:
      final_state:
        embedding_response:
          vectors_length: 3
          dimensions: 4
          inner_vector_lengths_all_equal: 4
          model: text-embedding-test
          response_id: emb-001-id
          usage:
            input_tokens: 6
      invariants:
        vectors_length_matches_input_length: true
        all_vectors_same_dimensionality: true
        dimensions_field_matches_inner_vector_length: true
