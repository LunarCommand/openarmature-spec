# retrieval-provider §6 + §7 — duplicate index surfaces
# provider_invalid_response. The §6 cross-impl invariant requires that
# the same index MUST NOT appear twice in results; a duplicate index
# MUST raise provider_invalid_response. (Directives in 006's header.)

cases:
  - name: rerank_duplicate_index_raises_provider_invalid_response
    description: |
      RerankProvider called with 3 input documents. Mocked response
      returns two results carrying the same index (0). The adapter
      MUST detect the duplicate and raise provider_invalid_response
      per §7.
    state:
      fields:
        rerank_response:
          type: record
          default: null
    entry: rerank_node
    nodes:
      rerank_node:
        calls_rerank:
          query: "q"
          documents: ["doc a", "doc b", "doc c"]
          stores_response_in: rerank_response
    edges:
      - {from: rerank_node, to: END}
    initial_state: {}
    mock_rerank:
      - status: 200
        body:
          id: rerank-009-id
          model: rerank-test
          results:
            - {index: 0, relevance_score: 0.9}
            - {index: 0, relevance_score: 0.4}
          meta:
            billed_units:
              search_units: 1
    expected_error:
      category: provider_invalid_response
      raised_from: rerank_node
    expected:
      invariants:
        duplicate_index_detected: true
        exception_raised_out_of_rerank_call: true
