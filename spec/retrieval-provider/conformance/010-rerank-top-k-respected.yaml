# retrieval-provider §5 + §6 — top_k contract pass-through surface.
# Covers the three permitted top_k outcomes end-to-end: exact match,
# provider undershoot (fewer results than requested), and top_k
# exceeding the document count. All three pass through; the negative
# control (provider returning MORE than top_k) lives in 011.
# (Directives documented in 006's header.)

cases:
  - name: top_k_exact
    description: |
      Caller supplies top_k=2 over 3 documents; provider returns 2
      results. Pass-through positive control — result count equals
      top_k.
    state:
      fields:
        rerank_response:
          type: record
          default: null
    entry: rerank_node
    nodes:
      rerank_node:
        calls_rerank:
          query: "q"
          documents: ["doc a", "doc b", "doc c"]
          top_k: 2
          stores_response_in: rerank_response
    edges:
      - {from: rerank_node, to: END}
    initial_state: {}
    mock_rerank:
      - status: 200
        body:
          id: rerank-010a-id
          model: rerank-test
          results:
            - {index: 0, relevance_score: 0.9}
            - {index: 1, relevance_score: 0.6}
          meta:
            billed_units:
              search_units: 1
    expected:
      final_state:
        rerank_response:
          results:
            - {index: 0, relevance_score: 0.9}
            - {index: 1, relevance_score: 0.6}
      invariants:
        result_count_equals_top_k: true

  - name: top_k_undershot
    description: |
      Caller supplies top_k=3 over 3 documents; provider returns only
      2 results (provider-side relevance filtering reduced the set).
      Permitted — a provider returning fewer than top_k passes through.
    state:
      fields:
        rerank_response:
          type: record
          default: null
    entry: rerank_node
    nodes:
      rerank_node:
        calls_rerank:
          query: "q"
          documents: ["doc a", "doc b", "doc c"]
          top_k: 3
          stores_response_in: rerank_response
    edges:
      - {from: rerank_node, to: END}
    initial_state: {}
    mock_rerank:
      - status: 200
        body:
          id: rerank-010b-id
          model: rerank-test
          results:
            - {index: 0, relevance_score: 0.9}
            - {index: 2, relevance_score: 0.4}
          meta:
            billed_units:
              search_units: 1
    expected:
      final_state:
        rerank_response:
          results:
            - {index: 0, relevance_score: 0.9}
            - {index: 2, relevance_score: 0.4}
      invariants:
        result_count_below_top_k_permitted: true

  - name: top_k_larger_than_documents
    description: |
      Caller supplies top_k=10 over 3 documents; provider returns 3
      results. top_k exceeding len(documents) is permitted and the
      contract holds (at most len(documents) results returned).
    state:
      fields:
        rerank_response:
          type: record
          default: null
    entry: rerank_node
    nodes:
      rerank_node:
        calls_rerank:
          query: "q"
          documents: ["doc a", "doc b", "doc c"]
          top_k: 10
          stores_response_in: rerank_response
    edges:
      - {from: rerank_node, to: END}
    initial_state: {}
    mock_rerank:
      - status: 200
        body:
          id: rerank-010c-id
          model: rerank-test
          results:
            - {index: 0, relevance_score: 0.9}
            - {index: 1, relevance_score: 0.6}
            - {index: 2, relevance_score: 0.2}
          meta:
            billed_units:
              search_units: 1
    expected:
      final_state:
        rerank_response:
          results:
            - {index: 0, relevance_score: 0.9}
            - {index: 1, relevance_score: 0.6}
            - {index: 2, relevance_score: 0.2}
      invariants:
        top_k_exceeding_document_count_permitted: true
        result_count_at_most_document_count: true
