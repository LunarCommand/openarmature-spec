# retrieval-provider §8.1 TEI /rerank — single-batch path (pool <=
# chunk_size).
#
# Verifies the §8.1 TEI rerank mapping when the candidate pool fits in
# one batch: 3 documents against the default chunk_size 32 => exactly
# ONE /rerank request. Locks:
#   - the /rerank request shape {query, texts, truncate: false, return_text}
#   - texts maps directly onto documents (no per-document object wrapping)
#   - return_documents (§6) -> return_text on the wire
#   - the TEI response [{index, score, text?}] mapping onto results
#     (index -> ScoredDocument.index, score -> relevance_score, text ->
#     document), returned UNSORTED so the §6 "sort if the provider didn't"
#     invariant is genuinely exercised
#   - results sorted by relevance_score descending with valid indices
#     (§6 / 0060 invariants)
#
# ---------------------------------------------------------------------
# Per-directory harness directives (per conformance-adapter §3.2). Base
# calls_rerank / mock_rerank directives are defined in 006's header; the
# §8.X wire-mapping vocabulary (mapping: tei, expected_wire_request, the
# TEI response shape) is defined in 013's header. New for the rerank
# wire path:
#
# - tei_rerank_provider: {base_url, model, chunk_size} — suite-level
#   construction block for the bound TEI RerankProvider (§8.1
#   *Construction*). chunk_size is the rerank client-batch chunk size
#   (default 32 per §8.1 *Mandatory rerank batch chunking*). base_url is
#   a generic placeholder.
#
# - expected_wire_request (case-level), under `mapping: tei`, is the
#   request body the mapping MUST POST to TEI's /rerank:
#   {"query": str, "texts": [str], "truncate": false, "return_text": bool}.
#   The harness captures the outbound body and compares key-by-key
#   (mapping key order not significant). For the chunk-and-stitch path
#   (015) this is a LIST of bodies, one per /rerank request in arrival
#   order; here it is a single body (one request).
#
# - mock_rerank entries under `mapping: tei` use TEI's real /rerank
#   response shape: a bare JSON array [{"index": int, "score": float,
#   "text"?: str}] (the 006-012 mock_rerank shape is the harness-internal
#   Cohere-flavoured stand-in; under TEI the body is what TEI returns).
#   TEI surfaces no response id and no usage billing block, so the mapped
#   RerankResponse carries response_id null and usage null — the RECORD
#   itself is null, NOT an all-null RerankUsage record (§6; the mapping
#   MUST NOT fabricate a RerankUsage).

mapping: tei

tei_rerank_provider:
  base_url: "http://tei-rerank.invalid"
  model: tei-rerank-test
  chunk_size: 32

cases:
  - name: single_batch_one_request_sorted_results
    description: |
      3 documents (<= chunk_size 32), default config (return_documents
      false). The mapping issues exactly ONE /rerank request carrying
      {query, texts: [...3...], truncate: false, return_text: false}. The
      mocked TEI response is UNSORTED ([{0, 0.42}, {1, 0.91}, {2, 0.08}]);
      the adapter MUST return results sorted by relevance_score descending
      ([{1, 0.91}, {0, 0.42}, {2, 0.08}]) with each index valid into the
      3-document input. TEI reports no id / no usage, so response_id is
      null and usage is null (the record itself, not an all-null record).
    state:
      fields:
        rerank_response:
          type: record
          default: null
    entry: rerank_node
    nodes:
      rerank_node:
        calls_rerank:
          query: "what is the capital of france?"
          documents: ["doc about berlin", "doc about paris", "doc about madrid"]
          stores_response_in: rerank_response
    edges:
      - {from: rerank_node, to: END}
    initial_state: {}
    expected_wire_request:
      query: "what is the capital of france?"
      texts: ["doc about berlin", "doc about paris", "doc about madrid"]
      truncate: false
      return_text: false
    expected_wire_request_count: 1
    mock_rerank:
      - status: 200
        body:
          - {index: 0, score: 0.42}
          - {index: 1, score: 0.91}
          - {index: 2, score: 0.08}
    expected:
      final_state:
        rerank_response:
          results:
            - {index: 1, relevance_score: 0.91, document: null}
            - {index: 0, relevance_score: 0.42, document: null}
            - {index: 2, relevance_score: 0.08, document: null}
          model: tei-rerank-test
          response_id: null
          usage: null
          # The verbatim deserialized TEI /rerank response — the BARE result
          # array (§6 raw). Single-request call, so raw is that one response
          # exactly: provider order and chunk-relative indices, NOT the
          # sorted/re-based `results` above.
          raw:
            - {index: 0, score: 0.42}
            - {index: 1, score: 0.91}
            - {index: 2, score: 0.08}
      invariants:
        exactly_one_rerank_request_issued: true
        wire_request_texts_match_documents_in_order: true
        wire_request_truncate_false: true
        wire_request_return_text_false: true
        results_sorted_by_relevance_descending: true
        each_index_valid_into_input_documents: true
        result_count_matches_response: true

  - name: single_batch_return_documents_maps_to_return_text
    description: |
      Same 3 documents with config return_documents=True. The /rerank
      request MUST carry return_text: true (the §6 return_documents ->
      TEI return_text mapping). The mocked TEI response echoes `text` per
      result; the adapter MUST surface it verbatim on
      ScoredDocument.document. Response again UNSORTED to exercise the
      sort. (TEI's echoed `text` is the provider's surface, NOT the input
      documents list — preserved verbatim per §6.)
    state:
      fields:
        rerank_response:
          type: record
          default: null
    entry: rerank_node
    nodes:
      rerank_node:
        calls_rerank:
          query: "what is the capital of france?"
          documents: ["doc about berlin", "doc about paris", "doc about madrid"]
          config:
            return_documents: true
          stores_response_in: rerank_response
    edges:
      - {from: rerank_node, to: END}
    initial_state: {}
    expected_wire_request:
      query: "what is the capital of france?"
      texts: ["doc about berlin", "doc about paris", "doc about madrid"]
      truncate: false
      return_text: true
    expected_wire_request_count: 1
    mock_rerank:
      - status: 200
        body:
          - {index: 0, score: 0.42, text: "doc about berlin"}
          - {index: 1, score: 0.91, text: "doc about paris"}
          - {index: 2, score: 0.08, text: "doc about madrid"}
    expected:
      final_state:
        rerank_response:
          results:
            - {index: 1, relevance_score: 0.91, document: "doc about paris"}
            - {index: 0, relevance_score: 0.42, document: "doc about berlin"}
            - {index: 2, relevance_score: 0.08, document: "doc about madrid"}
          model: tei-rerank-test
          response_id: null
          usage: null
          # The verbatim deserialized TEI /rerank response — the BARE result
          # array (§6 raw), including the echoed `text` per result. Single
          # request, so raw is that one response exactly: provider order and
          # chunk-relative indices, NOT the sorted/re-based `results` above.
          raw:
            - {index: 0, score: 0.42, text: "doc about berlin"}
            - {index: 1, score: 0.91, text: "doc about paris"}
            - {index: 2, score: 0.08, text: "doc about madrid"}
      invariants:
        exactly_one_rerank_request_issued: true
        wire_request_return_text_true: true
        results_sorted_by_relevance_descending: true
        each_index_valid_into_input_documents: true
        echoed_text_preserved_verbatim_on_document: true
