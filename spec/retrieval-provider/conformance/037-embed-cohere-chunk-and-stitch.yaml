# retrieval-provider §8.4 Cohere /v2/embed — MANDATORY batch chunking
# (96-input cap). THE LOAD-BEARING FIXTURE for the §8.4 embed
# chunk-and-stitch contract.
#
# Verifies §8.4 *Mandatory batch chunking (96-input cap)*: Cohere /v2/embed
# accepts at most 96 inputs per request, so when len(input) exceeds 96 the
# mapping MUST
#   1. split the inputs into CONSECUTIVE <=96 slices,
#   2. issue ONE /v2/embed request per chunk with IDENTICAL per-call params
#      (same model / input_type / embedding_types / truncate /
#      output_dimension),
#   3. concatenate the per-chunk embeddings.float arrays IN INPUT ORDER, and
#   4. sum meta.billed_units.input_tokens across chunks into
#      EmbeddingUsage.input_tokens; EmbeddingResponse.response_id is the
#      FIRST chunk's id.
#
# 100 inputs => two requests with texts sizes 96, 4 (the consecutive slices
# input[0:96], input[96:100]). Each chunk's mocked response carries its
# inputs' vectors under embeddings.float; the stitched
# EmbeddingResponse.vectors MUST be those vectors concatenated IN INPUT
# ORDER (vector i == the embedding the mock returned for input i, ACROSS the
# chunk boundary). Each vector's first component is its ABSOLUTE input index
# / 1000 (0.000 .. 0.099) so a mis-ordered stitch produces wrong vectors.
# input_tokens 480 + 20 = 500; response_id is chunk A's id (chunk B's id
# differs, so "first chunk's id" is load-bearing). This is the embedding
# analogue of §8.1's rerank chunk-and-stitch (fixture 015), resting on the
# same per-input-independence property — applied here to a FIXED VENDOR CAP
# (96), not TEI's construction-configured chunk_size.
#
# ---------------------------------------------------------------------
# Per-directory harness directives: see 015's header (the chunk-and-stitch
# path — expected_wire_request as a LIST of request bodies one per chunk in
# arrival order, expected_wire_request_count pinning the request count,
# mock_* entries dispatched one per request in arrival order) and 032's
# header (mapping: cohere, cohere_embedding_provider, the Cohere /v2/embed
# request + keyed-by-type response shapes). The harness MUST capture every
# outbound /v2/embed request, assert the count matches the list length, and
# compare each captured body key-by-key against the corresponding list
# entry; mock_embedding entries are dispatched one per /v2/embed request in
# arrival order, each a Cohere /v2/embed response with that chunk's
# embeddings.float vectors.

mapping: cohere

cohere_embedding_provider:
  base_url: "https://api.cohere.invalid"
  model: cohere-embed-test
  api_key: "test-cohere-key"

cases:
  - name: hundred_inputs_two_chunks_stitched_in_input_order
    description: |
      100 inputs, Cohere's 96-input cap. The mapping issues exactly 2
      /v2/embed requests with texts sizes [96, 4] over the consecutive
      slices input[0:96], input[96:100], with IDENTICAL per-call params on
      each (model cohere-embed-test, input_type "search_document" — the
      mandatory default since no OA input_type was supplied, embedding_types
      ["float"], truncate "NONE", and NO output_dimension). Each chunk's
      mocked response carries that chunk's inputs' vectors under
      embeddings.float (first component == absolute input index / 1000). The
      adapter MUST stitch: concatenate the per-chunk vectors IN INPUT ORDER
      (100 vectors, vector i == the embedding for input i across the chunk
      boundary), sum input_tokens 480 + 20 -> 500, and take response_id from
      the FIRST chunk's id (cohere-embed-037-chunk-a-id; chunk B's id
      differs). EmbeddingResponse.model is the bound id (Cohere echoes none).
      A mapping that sent all 100 inputs in one over-cap request, split into
      the wrong sizes, mis-ordered the stitch, or took chunk B's id fails.
