# retrieval-provider §7 *Malformed ancillary figures* — a malformed usage
# figure on a Cohere /v2/rerank response is treated as NOT REPORTED, never
# provider_invalid_response.
#
# Verifies §7's carve-out on the §8.4 Cohere rerank mapping: the reranking is
# sound but the single reported usage figure is MALFORMED. Cohere /v2/rerank
# meters ONLY meta.billed_units.search_units -> RerankUsage.search_units and
# never reports input_tokens (§8.4 — the inverse of Jina §8.2). So the reported
# figure set is one figure; a malformed search_units is not reported, and with
# input_tokens already unreported no figure is reported, which collapses
# RerankResponse.usage to null (§6 — "a record is present when at least one
# figure is reported"). The call SUCCEEDS: the results are sorted and intact,
# no §7 category is raised, the figure is nulled (never fabricated / coerced /
# clamped / repaired), and the verbatim malformed value stays on `raw` (§6).
# The rule binds the TYPED EVENT (graph-engine §6): RerankEvent.usage MUST be
# null to match the response.
#
# NOTE ON REACHABILITY: no current rerank mapping surfaces BOTH usage figures
# on the same wire — Cohere reports search_units only, Jina input_tokens only,
# TEI none — so a "partial record" where one figure is malformed and the OTHER
# survives is not CONSTRUCTIBLE against any real mapping. Each mapping's single
# reported figure collapses the record just as embedding's single-figure
# EmbeddingUsage does (fixture 040 Case A). The two-figure partial record is a
# consequence of §7's per-figure rule that the rule STATES but no mapping can
# exercise yet; this fixture pins the reachable single-figure collapse.
#
# ---------------------------------------------------------------------
# Per-directory harness directives: see 006's header (calls_rerank /
# mock_rerank), 028's header (mapping: cohere, cohere_rerank_provider, the
# Cohere /v2/rerank request + response shapes, expected_wire_request /
# expected_wire_request_absent_keys / expected_wire_headers), 014's header (the
# rerank `raw` assertion — the verbatim deserialized response on
# RerankResponse.raw), and 033's header (typed_observers: [{name, kind:
# typed_event_collector}] + expected.observers.<name>.contains_event asserting
# a typed event's fields — reused here for RerankEvent).

mapping: cohere

cohere_rerank_provider:
  base_url: "https://api.cohere.invalid"
  model: cohere-rerank-test
  api_key: "test-cohere-key"

cases:
  - name: malformed_search_units_collapses_usage_to_null
    description: |
      3 documents, default config, no top_k. The mapping issues ONE POST to
      {base_url}/v2/rerank. The mocked Cohere response is UNSORTED ([{0, 0.42},
      {1, 0.91}, {2, 0.08}]) with SOUND results and a sound top-level id, but
      meta.billed_units.search_units is the NEGATIVE -3 — malformed (a negative
      where a non-negative count belongs). Per §7 the figure is not reported;
      search_units is Cohere's only reported usage figure (input_tokens is
      never reported), so with no figure reported the record collapses:
      RerankResponse.usage is null (§6). The adapter MUST still sort by
      relevance_score descending ([{1, 0.91}, {0, 0.42}, {2, 0.08}]) with valid
      indices, MUST NOT raise provider_invalid_response, MUST NOT clamp -3 to 0
      or fabricate a figure, and MUST leave the verbatim -3 on `raw`. Cohere
      echoes no document, so every ScoredDocument.document is null.
      RerankEvent.usage MUST be null to match the response.
    state:
      fields:
        rerank_response:
          type: record
          default: null
    entry: rerank_node
    nodes:
      rerank_node:
        calls_rerank:
          query: "what is the capital of france?"
          documents: ["doc about berlin", "doc about paris", "doc about madrid"]
          stores_response_in: rerank_response
    edges:
      - {from: rerank_node, to: END}
    initial_state: {}
    expected_wire_request:
      model: cohere-rerank-test
      query: "what is the capital of france?"
      documents: ["doc about berlin", "doc about paris", "doc about madrid"]
    expected_wire_request_absent_keys: [top_n, return_documents, truncation]
    expected_wire_request_count: 1
    expected_wire_headers:
      Authorization: "Bearer test-cohere-key"
    mock_rerank:
      - status: 200
        body:
          id: cohere-rerank-041-id
          results:
            - {index: 0, relevance_score: 0.42}
            - {index: 1, relevance_score: 0.91}
            - {index: 2, relevance_score: 0.08}
          meta:
            billed_units:
              search_units: -3
    typed_observers:
      - name: collector
        kind: typed_event_collector
    expected:
      final_state:
        rerank_response:
          results:
            - {index: 1, relevance_score: 0.91, document: null}
            - {index: 0, relevance_score: 0.42, document: null}
            - {index: 2, relevance_score: 0.08, document: null}
          model: cohere-rerank-test
          # Sound id surfaces normally — judged independently of the figure.
          response_id: cohere-rerank-041-id
          # Single-figure collapse: search_units is Cohere's only reported
          # figure and it is malformed, so no figure is reported and the whole
          # RerankUsage record is null (NOT {search_units: 0, input_tokens: null}
          # and NOT {search_units: -3, ...}).
          usage: null
          # Verbatim response: the malformed -3 preserved byte-for-value on
          # `raw`, where the caller inspects what the provider sent.
          raw:
            id: cohere-rerank-041-id
            results:
              - {index: 0, relevance_score: 0.42}
              - {index: 1, relevance_score: 0.91}
              - {index: 2, relevance_score: 0.08}
            meta:
              billed_units:
                search_units: -3
      observers:
        collector:
          contains_event:
            event_type: RerankEvent
            fields:
              node_name: rerank_node
              usage: null
      invariants:
        exactly_one_rerank_request_issued: true
        results_sorted_by_relevance_descending: true
        each_index_valid_into_input_documents: true
        every_document_null_when_cohere_omits_echo: true
        malformed_search_units_not_reported_usage_null: true
        usage_not_clamped_or_fabricated: true
        no_provider_invalid_response_raised: true
        malformed_value_preserved_verbatim_on_raw: true
        rerank_event_usage_null_mirrors_response: true
