# retrieval-provider §7 *Malformed ancillary figures* + §8 *Batch chunking*
# step 4 — a malformed per-chunk input_tokens collapses the STITCHED usage to
# null, never a partial sum of only the well-formed chunks.
#
# Verifies the chunk-and-stitch interaction of §7 with §8 on the §8.4 Cohere
# /v2/embed mapping. An over-cap (>96 inputs) embed call chunk-and-stitches
# across two /v2/embed requests. One chunk's meta.billed_units.input_tokens is
# MALFORMED and the other's is sound. Per §8 step 4 (amended by §7): a chunk
# whose input_tokens is malformed has NOT reported usage, so if ANY chunk is
# malformed the stitched EmbeddingResponse.usage is null. A mapping MUST NOT
# sum only the well-formed chunks — that would report a total the provider
# never sent (here 480), understating the true count and indistinguishable from
# a truthful figure: the fabrication §7 forbids. Nothing is lost: `raw` is the
# LIST of the per-chunk verbatim responses (§8 / 0096), so every chunk's figure
# (including the malformed one) remains available. The vectors stitch normally
# — the malformed accounting figure does not impugn the payload. The rule binds
# the TYPED EVENT (graph-engine §6): EmbeddingEvent.usage MUST be null to match.
#
# 100 inputs => two requests with texts sizes 96, 4 (the consecutive slices
# input[0:96], input[96:100]). Chunk A reports a SOUND input_tokens 480; chunk
# B reports a MALFORMED input_tokens ("abc", a string). The stitched usage is
# null (NOT 480, NOT 484); vectors concatenate in input order across the chunk
# boundary; response_id is chunk A's id (the first chunk's, sound). Each
# vector's first component is its ABSOLUTE input index / 1000 (0.000 .. 0.099)
# so a mis-ordered stitch produces wrong vectors. This is the chunk-and-stitch
# analogue of fixture 040 Case A's single-request single-figure collapse.
#
# ---------------------------------------------------------------------
# Per-directory harness directives: see 037's header (the Cohere embed
# chunk-and-stitch path — expected_wire_request as a LIST of request bodies one
# per chunk in arrival order, expected_wire_request_count, mock_embedding
# dispatched one per request in arrival order, and the chunked `raw` as the
# list of per-chunk verbatim response objects), 032's header (mapping: cohere,
# cohere_embedding_provider, the Cohere /v2/embed request + keyed-by-type
# response shapes), and 033's header (typed_observers + contains_event
# asserting an EmbeddingEvent's fields — reused here to assert the event
# mirrors the nulled stitched usage).

