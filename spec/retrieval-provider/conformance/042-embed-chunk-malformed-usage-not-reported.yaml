      input[0:96], input[96:100], identical per-call params on each. This time
      BOTH chunks report a SOUND meta.billed_units.input_tokens — chunk A 480,
      chunk B 20 — so the stitched EmbeddingUsage is a real summed record
      ({input_tokens: 500} per §8's sum rule), unaffected by the id defect.
      What is malformed is the FIRST chunk's top-level id: chunk A carries the
      NUMBER 99999 where a string id belongs (the malformed-id kind of fixture
      040 Case B), while chunk B (a LATER chunk) carries a SOUND string id
      (cohere-embed-042b-chunkB-id). Per §8 step 4 amended by §7: response_id
      is the FIRST chunk's id, a malformed first-chunk id is null, and a
      mapping MUST NOT fall through to a later chunk's id — so
      EmbeddingResponse.response_id is null, NOT chunk B's id and NOT the
      stringified "99999". A fall-through bug ("use the first non-malformed
      chunk id") would surface chunk B's id here and FAIL. usage is judged
      independently of the id, so the summed {input_tokens: 500} stands. The
      vectors stitch in input order across the chunk boundary and no
      provider_invalid_response is raised. `raw` is the LIST of the two
      per-chunk verbatim response objects, in request order — chunk A's object
      carrying the malformed numeric id 99999, chunk B's object carrying its
      sound string id. EmbeddingEvent.response_id MUST be null to match the
      stitched response; EmbeddingEvent.usage MUST be the summed record.
